name: 'g0 AI Agent Security Scan'
description: 'Scan AI agent code for security vulnerabilities using g0'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan'
    default: '.'
  min-score:
    description: 'Minimum security score (0-100)'
    default: '70'
  min-grade:
    description: 'Minimum grade (A, B, C, D, F)'
    required: false
  fail-on:
    description: 'Fail on severity level (critical, high, medium)'
    default: 'high'
  sarif:
    description: 'Upload SARIF results to GitHub Code Scanning'
    default: 'true'
  version:
    description: 'g0 version to install'
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install g0
      shell: bash
      run: npm install -g @guard0/agentsec@${{ inputs.version }}

    - name: Run g0 security gate
      shell: bash
      id: gate
      run: |
        ARGS="${{ inputs.path }} --min-score ${{ inputs.min-score }}"

        if [ -n "${{ inputs.min-grade }}" ]; then
          ARGS="$ARGS --min-grade ${{ inputs.min-grade }}"
        fi

        if [ "${{ inputs.fail-on }}" = "critical" ]; then
          ARGS="$ARGS --no-critical"
        elif [ "${{ inputs.fail-on }}" = "high" ]; then
          ARGS="$ARGS --no-high"
        fi

        if [ "${{ inputs.sarif }}" = "true" ]; then
          ARGS="$ARGS --sarif ${{ github.workspace }}/g0-results.sarif"
        fi

        g0 gate $ARGS || echo "gate_failed=true" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF results
      if: inputs.sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: g0-results.sarif
      continue-on-error: true

    - name: Check gate result
      shell: bash
      if: steps.gate.outputs.gate_failed == 'true'
      run: |
        echo "::error::g0 security gate failed. Review findings above."
        exit 1
