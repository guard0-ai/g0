id: AA-CE-061
info:
  name: "Unsafe subprocess call with shell=True"
  domain: code-execution
  severity: critical
  confidence: high
  description: "Python code calls subprocess with shell=True, enabling shell injection attacks."
  frameworks: [langchain, crewai, autogen]
  owasp_agentic: [ASI05]
  standards:
    owasp_agentic: [ASI05]
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "subprocess\\.(run|call|Popen)\\(.*shell\\s*=\\s*True"
  language: python
  message: "subprocess called with shell=True — risk of shell injection"
