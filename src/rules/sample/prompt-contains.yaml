id: AA-GI-062
info:
  name: "System prompt contains eval instruction"
  domain: goal-integrity
  severity: critical
  confidence: high
  description: "System prompt instructs the agent to evaluate or execute arbitrary code from user input."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI05]
  standards:
    owasp_agentic: [ASI01, ASI05]
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: prompt_contains
  pattern: "\\b(eval|exec|execute)\\s+(any|all|user|the)\\s+(code|command|input)"
  message: "System prompt instructs agent to evaluate arbitrary code"
