id: AA-RB-049
info:
  name: "Missing jitter in retry backoff"
  domain: reliability-bounds
  severity: low
  confidence: medium
  description: "Retry backoff strategy does not include jitter. Without jitter, multiple agents retrying simultaneously create thundering herd effects that amplify service degradation."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "jitter|random.*delay|Math\\.random\\(\\).*backoff|randomize.*wait"
  language: any
  message: "Retry backoff missing jitter to prevent thundering herd"
