id: AA-RB-071
info:
  name: "No total operation timeout"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "Multi-step agent operations have no total time budget. Without a global operation timeout, a series of individually-acceptable steps can accumulate to an unacceptable total duration."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "total.*timeout|operation.*timeout|deadline|max.*duration|time.*budget"
  language: any
  message: "No total operation timeout for multi-step agent workflow"
