id: AA-RB-099
info:
  name: "No connection pool limit"
  domain: reliability-bounds
  severity: medium
  confidence: high
  description: "HTTP connections to LLM APIs are not pooled or the pool has no maximum size. Unbounded connections can exhaust file descriptors and cause 'EMFILE: too many open files' errors."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "pool.*size|max.*connections|maxSockets|connection.*pool|pool.*limit|max.*sockets"
  language: any
  message: "No connection pool limit for LLM API connections"
