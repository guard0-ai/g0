id: AA-RB-048
info:
  name: "No exponential backoff on retries"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "Retry logic uses fixed intervals instead of exponential backoff. Fixed-interval retries can overwhelm already-stressed services and trigger rate limiting, making recovery slower."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "retry.*delay|sleep.*retry|setTimeout.*retry|wait.*retry"
  language: any
  message: "Retry logic without exponential backoff strategy"
