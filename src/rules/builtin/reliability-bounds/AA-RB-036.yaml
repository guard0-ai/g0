id: AA-RB-036
info:
  name: "No semantic validation of LLM output"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "LLM output passes syntactic checks but is never validated for semantic correctness. Syntactically valid but semantically wrong output (e.g., wrong units, implausible values, contradictory statements) can propagate silently."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-2.7]
check:
  type: prompt_missing
  pattern: "semantic|meaning|plausib|coherent|consistent|makes sense|logical"
  language: any
  message: "No semantic validation applied to LLM output"
