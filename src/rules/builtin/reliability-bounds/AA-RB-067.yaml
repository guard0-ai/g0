id: AA-RB-067
info:
  name: "No output caching for consistency"
  domain: reliability-bounds
  severity: low
  confidence: medium
  description: "Identical LLM requests are not cached, causing the same query to produce different results each time. Caching identical requests improves consistency and reduces costs."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.5, MANAGE-2.2]
check:
  type: code_matches
  pattern: "cache|memoiz|lru_cache|cached.*response|response.*cache"
  language: any
  message: "No caching mechanism for identical LLM requests"
