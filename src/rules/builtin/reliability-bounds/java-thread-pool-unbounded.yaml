id: AA-RB-110
info:
  name: "Unbounded thread pool in Java agent"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "Executors.newCachedThreadPool() or unbounded thread pools in agent code. Each agent request spawning a new thread can exhaust system resources under load."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "Executors\\.newCachedThreadPool\\(|new\\s+ThreadPoolExecutor\\(.*Integer\\.MAX_VALUE"
  language: java
  message: "Unbounded thread pool — resource exhaustion under load"
