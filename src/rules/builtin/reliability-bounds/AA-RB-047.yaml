id: AA-RB-047
info:
  name: "Infinite retry loop possible"
  domain: reliability-bounds
  severity: high
  confidence: high
  description: "Retry logic has no maximum attempt limit, creating the possibility of an infinite retry loop. Unbounded retries can exhaust resources, accumulate costs, and block other operations indefinitely."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "while\\s*\\(true\\).*retry|retry.*=.*true|for\\s*\\(;\\s*;\\)|while.*!.*success"
  language: any
  message: "Retry loop without maximum attempt limit detected"
