id: AA-RB-025
info:
  name: "Fabricated references in LLM output"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "LLM-generated citations, references, or bibliographic entries are not verified against real sources. LLMs frequently fabricate plausible-looking references that do not exist."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-2.7]
check:
  type: prompt_missing
  pattern: "verify.?reference|check.?citation|validate.?source|confirm.?publication"
  language: any
  message: "No verification of LLM-generated references or citations"
