id: AA-RB-052
info:
  name: "Missing retry budget"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "No global retry budget limits total retry attempts across all operations. Without a retry budget, cascading retries across multiple agent steps can amplify load and costs exponentially."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "retry_budget|total_retries|global.*retry.*limit|retry.*quota"
  language: any
  message: "No global retry budget configured to limit total retry attempts"
