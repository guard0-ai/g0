id: AA-RB-042
info:
  name: "No confidence calibration"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "LLM confidence scores are not calibrated against actual accuracy. Raw model confidence often does not correlate well with correctness, leading to unreliable confidence-based decisions."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-2.4]
check:
  type: code_matches
  pattern: "calibrat|reliability.?diagram|expected.?calibration|brier.?score"
  language: any
  message: "No confidence calibration applied to LLM output scores"
