id: AA-RB-022
info:
  name: "Missing fact-checking on generated content"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "LLM-generated content is passed to downstream consumers without any fact-checking or verification layer. Hallucinated facts can propagate through agentic pipelines and lead to incorrect decisions."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-2.7]
check:
  type: prompt_missing
  pattern: "verify|fact.?check|validate.?claim|check.?accuracy|confirm.?source"
  language: any
  message: "No fact-checking mechanism found for LLM-generated content"
