id: AA-RB-093
info:
  name: "No memory limit for agent process"
  domain: reliability-bounds
  severity: high
  confidence: high
  description: "Agent process has no memory limit configured. Without memory bounds, large context accumulation, embedding storage, or response caching can consume all available memory and crash the host."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "memory.*limit|max.*memory|heap.*limit|--max-old-space-size|memory.*quota|RSS.*limit"
  language: any
  message: "No memory limit configured for agent process"
