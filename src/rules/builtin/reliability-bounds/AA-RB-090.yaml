id: AA-RB-090
info:
  name: "Missing degradation notification"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "Agent enters degraded mode without notifying users or operators. Users receiving degraded responses without notification may trust lower-quality outputs as full-fidelity results."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2, MANAGE-2.4]
    iso42001: [A.7.4]
check:
  type: code_matches
  pattern: "notify.*degrad|alert.*fallback|warn.*degraded|status.*degraded|degradation.*notice"
  language: any
  message: "No notification when agent enters degraded mode"
