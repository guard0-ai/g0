id: AA-RB-085
info:
  name: "No degradation strategy defined"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "Agent has no graceful degradation strategy for when LLM services are impaired. Without a degradation plan, partial failures escalate to total outages instead of reduced-quality service."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2, MANAGE-2.4]
check:
  type: code_matches
  pattern: "degrad|fallback.*mode|reduced.*service|minimal.*mode|safe.*mode|graceful"
  language: any
  message: "No graceful degradation strategy for LLM service impairment"
