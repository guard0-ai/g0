id: AA-RB-056
info:
  name: "Missing spending alerts for LLM costs"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "No alerting mechanism exists for LLM spending thresholds. Without spending alerts, cost overruns from runaway agents or abuse are only discovered after significant financial impact."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2, MANAGE-2.3]
check:
  type: code_matches
  pattern: "spending.*alert|cost.*threshold|budget.*warn|expense.*notif|cost.*limit.*alert"
  language: any
  message: "No spending alerts configured for LLM cost management"
