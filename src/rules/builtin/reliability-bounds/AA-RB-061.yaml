id: AA-RB-061
info:
  name: "Non-deterministic LLM outputs in critical path"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "LLM calls in critical decision paths use non-deterministic settings. Non-deterministic outputs in security-sensitive or financial operations can produce inconsistent results across runs."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-2.5]
check:
  type: code_matches
  pattern: "temperature.*(?:0\\.[5-9]|1\\.0)|top_p.*(?:0\\.[8-9]|1\\.0)"
  language: any
  message: "Non-deterministic LLM settings used in critical decision path"
