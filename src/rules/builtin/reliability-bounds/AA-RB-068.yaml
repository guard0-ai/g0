id: AA-RB-068
info:
  name: "Variable system prompts across instances"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "System prompts vary between agent instances or are dynamically generated without version control. Inconsistent system prompts cause unpredictable behavioral differences across deployments."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.5, MANAGE-1.1]
check:
  type: code_matches
  pattern: "system.*prompt.*=.*f\"|system.*prompt.*\\+|system.*=.*template|system_message.*format"
  language: any
  message: "System prompt varies dynamically without version control"
