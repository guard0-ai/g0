id: AA-RB-038
info:
  name: "Low-confidence output accepted without review"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "LLM outputs with low confidence scores are accepted and acted upon without human review or additional verification. Low-confidence outputs should trigger review workflows or fallback mechanisms."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MANAGE-1.3]
check:
  type: code_matches
  pattern: "confidence.*<.*0\\.[3-5]|score.*<.*0\\.[3-5]|low.?confidence.*accept|uncertain.*proceed"
  language: any
  message: "Low-confidence LLM output accepted without additional review"
