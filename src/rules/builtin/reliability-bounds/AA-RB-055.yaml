id: AA-RB-055
info:
  name: "No cost tracking for LLM usage"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "Agent does not track or log the cost of LLM API calls. Without cost tracking, usage spikes go unnoticed until billing statements arrive, preventing timely cost control."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2, MANAGE-2.3]
check:
  type: code_matches
  pattern: "cost.*track|usage.*log|token.*count|billing|metering|cost.*monitor"
  language: any
  message: "No cost tracking implemented for LLM API usage"
