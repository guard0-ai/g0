id: AA-RB-076
info:
  name: "No deadline propagation in agent chain"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "Timeouts are set per-step but not propagated as a shrinking deadline through the agent chain. Without deadline propagation, later steps may receive timeouts that exceed the total budget."
  frameworks: [langchain, crewai, autogen]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "deadline|remaining.*time|time.*remaining|elapsed.*time|time.*left"
  language: any
  message: "No deadline propagation across agent chain steps"
