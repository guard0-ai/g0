id: AA-RB-064
info:
  name: "Random sampling without control parameters"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "LLM uses random sampling (top_k, top_p) without explicitly controlling the parameters. Uncontrolled sampling can produce wildly varying outputs that are difficult to predict or constrain."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.5, MEASURE-2.6]
check:
  type: code_matches
  pattern: "top_k|top_p|nucleus.?sampl|do_sample\\s*=\\s*True"
  language: any
  message: "Random sampling parameters not explicitly controlled"
