id: AA-RB-037
info:
  name: "No confidence threshold configured"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "Agent accepts all LLM outputs regardless of confidence level. Without a minimum confidence threshold, low-quality or uncertain responses are treated the same as high-confidence ones."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-1.1]
check:
  type: config_matches
  pattern: "confidence_threshold|min_confidence|confidence_level"
  language: any
  message: "No confidence threshold configured for LLM output acceptance"
