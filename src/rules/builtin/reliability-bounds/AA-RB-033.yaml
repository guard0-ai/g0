id: AA-RB-033
info:
  name: "Missing output sanitization"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "LLM output is rendered or stored without sanitization. Unsanitized output may contain executable code, HTML injection, SQL fragments, or other payloads that exploit downstream systems."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
    owasp_llm_top10: [LLM02]
check:
  type: code_matches
  pattern: "innerHTML.*=.*response|dangerouslySetInnerHTML|\\$\\{.*output.*\\}.*query|exec\\(.*result"
  language: any
  message: "LLM output used without sanitization in sensitive context"
