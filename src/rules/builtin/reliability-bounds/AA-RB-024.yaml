id: AA-RB-024
info:
  name: "Hallucinated URLs in LLM output"
  domain: reliability-bounds
  severity: high
  confidence: high
  description: "LLM-generated output containing URLs is not validated for existence or correctness. Hallucinated URLs can lead users to non-existent pages, phishing sites, or domains registered by attackers to exploit this pattern."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
    owasp_llm_top10: [LLM09]
check:
  type: code_matches
  pattern: "https?://.*\\$\\{|url.*=.*response|link.*=.*completion|href.*=.*result"
  language: any
  message: "URLs from LLM output used without validation"
