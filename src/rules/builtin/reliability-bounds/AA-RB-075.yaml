id: AA-RB-075
info:
  name: "Missing keepalive timeout"
  domain: reliability-bounds
  severity: low
  confidence: medium
  description: "HTTP connections to LLM APIs have no keepalive timeout configured. Idle connections held open indefinitely consume file descriptors and connection pool slots."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "keepAlive|keep_alive|keepalive.*timeout|idle.*timeout|connection.*timeout"
  language: any
  message: "No keepalive timeout configured for LLM API connections"
