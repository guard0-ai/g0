id: AA-RB-041
info:
  name: "Overconfident LLM responses not flagged"
  domain: reliability-bounds
  severity: medium
  confidence: low
  description: "Agent does not detect or flag overconfident LLM responses. LLMs often express high certainty even when producing incorrect information, which can mislead users and automated decision systems."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-2.11]
check:
  type: prompt_missing
  pattern: "overconfiden|calibrat|verify certainty|double.?check|cross.?reference"
  language: any
  message: "No detection mechanism for overconfident LLM responses"
