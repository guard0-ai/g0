id: AA-RB-026
info:
  name: "No confidence scoring on LLM output"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "LLM responses lack any confidence scoring or probability estimation. Without confidence signals, downstream systems cannot distinguish high-certainty from speculative outputs."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-1.1]
check:
  type: prompt_missing
  pattern: "confidence|certainty|probability|likelihood|how sure|how confident"
  language: any
  message: "No confidence scoring requested for LLM output"
