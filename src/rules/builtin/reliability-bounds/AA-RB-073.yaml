id: AA-RB-073
info:
  name: "No cancellation mechanism for LLM calls"
  domain: reliability-bounds
  severity: medium
  confidence: medium
  description: "LLM API calls cannot be cancelled once initiated. Without a cancellation mechanism (e.g., AbortController), users cannot stop long-running operations, and the agent cannot implement timeouts."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "AbortController|abort.*signal|cancel.*token|cancellation"
  language: any
  message: "No cancellation mechanism available for LLM API calls"
