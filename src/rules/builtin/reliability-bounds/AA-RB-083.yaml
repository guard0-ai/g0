id: AA-RB-083
info:
  name: "Missing backpressure mechanism"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "Agent has no backpressure mechanism to slow down producers when LLM consumers are overloaded. Without backpressure, the system continues accepting requests it cannot process, leading to cascading failures."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "backpressure|back.?pressure|flow.?control|pause.*resume|highWaterMark|watermark"
  language: any
  message: "No backpressure mechanism to handle LLM consumer overload"
