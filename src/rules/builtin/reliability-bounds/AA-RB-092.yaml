id: AA-RB-092
info:
  name: "No load shedding mechanism"
  domain: reliability-bounds
  severity: high
  confidence: medium
  description: "Agent has no load shedding mechanism to drop low-priority requests under extreme load. Without load shedding, all requests degrade equally, potentially failing high-priority operations."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [MANAGE-2.2]
check:
  type: code_matches
  pattern: "load.?shed|shed.*load|priority.*queue|drop.*request|reject.*overflow|admission.*control"
  language: any
  message: "No load shedding mechanism for high-load scenarios"
