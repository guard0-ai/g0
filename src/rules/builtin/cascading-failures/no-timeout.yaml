id: AA-CF-061
info:
  name: "Timeout disabled or set to infinity"
  domain: cascading-failures
  severity: high
  confidence: high
  description: "Timeout is disabled or set to infinity. Without a finite timeout, agent calls to external services or LLM providers can hang indefinitely, blocking the entire execution pipeline and causing cascading resource exhaustion."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "timeout\\s*=\\s*(None|0|null|undefined|Infinity)"
  language: any
  message: "Timeout disabled or set to infinity — risk of hanging"
