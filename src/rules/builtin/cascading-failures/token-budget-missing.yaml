id: AA-CF-073
info:
  name: "No token budget limit configured"
  domain: cascading-failures
  severity: medium
  confidence: high
  description: "Agent has no token budget limit configured. Without a cap on token consumption, a runaway agent can generate unbounded API spend, exhaust billing quotas, and cause service disruptions for other consumers."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: agent_property
  property: maxTokenBudget
  condition: missing
  message: "No token budget limit — risk of unbounded API spend"
