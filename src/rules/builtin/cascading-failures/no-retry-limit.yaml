id: AA-CF-063
info:
  name: "No retry limit configured"
  domain: cascading-failures
  severity: medium
  confidence: medium
  description: "Retry logic is configured without a finite limit. Infinite or unbounded retries can amplify transient failures into sustained outages, exhaust rate limits, and cause cascading resource consumption."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "retry.*=\\s*(True|Infinity|-1)|max_retries\\s*=\\s*(None|0|-1)"
  language: any
  message: "No retry limit configured — risk of infinite retry loops"
