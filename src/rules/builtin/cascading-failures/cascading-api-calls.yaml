id: AA-CF-070
info:
  name: "Sequential API calls in loop without backoff"
  domain: cascading-failures
  severity: medium
  confidence: low
  description: "Sequential API calls are made inside a loop without backoff or batching. This pattern can overwhelm downstream services, trigger rate limits, and cause cascading failures across dependent systems."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "for .* in .*:\\s*\\n\\s*.*\\.(get|post|fetch|request)\\("
  language: any
  message: "Sequential API calls in loop without backoff or batching"
