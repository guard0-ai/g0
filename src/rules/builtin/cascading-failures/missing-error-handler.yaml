id: AA-CF-064
info:
  name: "Agent has no error handler configured"
  domain: cascading-failures
  severity: high
  confidence: high
  description: "Agent is configured without an error handler. Unhandled errors in agent execution propagate unchecked, potentially crashing the entire pipeline and leaving dependent systems in an inconsistent state."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: agent_property
  property: hasErrorHandler
  condition: missing
  message: "Agent has no error handler configured"
