id: AA-HO-073
info:
  name: "Auto-execute without confirmation"
  domain: human-oversight
  severity: high
  confidence: high
  description: "Agent is configured to automatically execute tool calls or actions without requiring user confirmation. Auto-execution bypasses human oversight and can lead to unintended consequences."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.1]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.2]
check:
  type: config_matches
  pattern: "auto.?execute|auto.?run|auto.?approve|skip.?confirmation|no.?confirm|execute_immediately"
  language: any
  message: "Agent configured to auto-execute without user confirmation"
