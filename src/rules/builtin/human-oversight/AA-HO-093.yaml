id: AA-HO-093
info:
  name: "No manual intervention path"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent workflow has no path for manual human intervention. When the agent encounters ambiguous situations or errors, there must be a way for humans to step in and take control."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-4.1]
    eu_ai_act: [Art14-1, Art14-3]
    iso42001: [A.8.2]
check:
  type: prompt_missing
  pattern: "manual_intervention|human_takeover|hand_off|escalate_to_human|transfer_to_agent|fallback_human"
  language: any
  message: "No manual intervention path for human operators"
