id: AA-HO-097
info:
  name: "No severity-based escalation routing"
  domain: human-oversight
  severity: medium
  confidence: medium
  description: "Escalation does not route based on severity level. Critical issues should escalate to senior operators or on-call teams, while lower severity issues can go to standard support."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MANAGE-4.1, MANAGE-2.4]
    eu_ai_act: [Art14-3]
    iso42001: [A.8.2]
check:
  type: prompt_missing
  pattern: "severity_routing|route_by_severity|priority_escalation|critical_path|severity_level"
  language: any
  message: "No severity-based routing in escalation policy"
