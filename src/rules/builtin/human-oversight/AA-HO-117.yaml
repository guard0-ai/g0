id: AA-HO-117
info:
  name: "Approval scope too broad"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Approval grants access or authorization for a scope broader than what the specific action requires. Approvals should be scoped to the minimum necessary permissions and resources."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-2.2]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.2]
check:
  type: code_matches
  pattern: "\\bapprov\\w+.*\\b(all_resources|wildcard|\\*|full_access|global_scope|any_action|unrestricted)\\b"
  language: any
  message: "Approval scope is broader than necessary for the specific action"
