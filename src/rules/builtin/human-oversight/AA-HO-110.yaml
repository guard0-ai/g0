id: AA-HO-110
info:
  name: "No consent revocation mechanism"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent does not support consent revocation. Users must be able to revoke previously given consent at any time, and the agent must stop processing data upon revocation."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-4.1]
    eu_ai_act: [Art14-1, Art15-1]
    iso42001: [A.8.5]
check:
  type: prompt_missing
  pattern: "revoke_consent|withdraw_consent|cancel_consent|delete_consent|consent_revocation|remove_permission"
  language: any
  message: "No consent revocation mechanism available to users"
