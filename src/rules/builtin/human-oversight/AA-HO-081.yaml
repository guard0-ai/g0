id: AA-HO-081
info:
  name: "No user attribution in audit records"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Audit records do not capture who initiated or authorized the action. Without user attribution, it is impossible to determine accountability for agent actions."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-4.1]
    eu_ai_act: [Art12-1, Art14-4]
    iso42001: [A.6.2]
check:
  type: prompt_missing
  pattern: "user_id|actor|initiated_by|requested_by|authorized_by|performed_by|attribution"
  language: any
  message: "Audit records missing user attribution"
