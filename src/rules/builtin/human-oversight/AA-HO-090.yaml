id: AA-HO-090
info:
  name: "Override requires full restart"
  domain: human-oversight
  severity: medium
  confidence: medium
  description: "Overriding agent behavior or configuration requires a full restart of the agent process. Operators should be able to adjust parameters at runtime without downtime."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MANAGE-4.2, MANAGE-4.1]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.2]
check:
  type: config_matches
  pattern: "restart_required|requires_restart|reboot_to_apply|must_restart"
  language: any
  message: "Configuration override requires full agent restart"
