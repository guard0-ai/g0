id: AA-HO-104
info:
  name: "Missing opt-out mechanism"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent does not provide users with a mechanism to opt out of data collection, processing, or automated decision-making. Users must have the ability to withdraw from agent interactions."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MANAGE-4.1]
    eu_ai_act: [Art14-1, Art15-1]
    iso42001: [A.8.5]
check:
  type: prompt_missing
  pattern: "opt_out|unsubscribe|withdraw_consent|stop_tracking|disable_collection|remove_data|right_to_forget"
  language: any
  message: "No opt-out mechanism provided for users"
