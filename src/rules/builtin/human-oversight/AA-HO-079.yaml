id: AA-HO-079
info:
  name: "No audit logging for agent actions"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent performs actions without writing audit log entries. All agent actions, especially tool invocations and decisions, must be logged for accountability and post-incident review."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-4.1]
    eu_ai_act: [Art14-4, Art12-1]
    iso42001: [A.6.2, A.8.4]
check:
  type: prompt_missing
  pattern: "audit|log_action|record_action|write_log|audit_trail|event_log"
  language: any
  message: "No audit logging mechanism found for agent actions"
