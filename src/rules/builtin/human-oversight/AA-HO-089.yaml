id: AA-HO-089
info:
  name: "No graceful shutdown trigger"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent lacks a graceful shutdown mechanism that completes in-progress work safely before terminating. Abrupt termination can leave systems in inconsistent states."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MANAGE-4.2]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.6]
check:
  type: prompt_missing
  pattern: "graceful_shutdown|signal_handler|SIGTERM|SIGINT|cleanup|on_shutdown|shutdown_hook"
  language: any
  message: "No graceful shutdown trigger or signal handler found"
