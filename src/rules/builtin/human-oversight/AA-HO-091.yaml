id: AA-HO-091
info:
  name: "No pause capability"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent cannot be paused mid-execution and resumed later. Pause capability allows operators to inspect agent state, review pending actions, and decide whether to continue."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MANAGE-4.2, GOVERN-1.1]
    eu_ai_act: [Art14-1, Art14-4]
    iso42001: [A.8.2]
check:
  type: prompt_missing
  pattern: "pause|suspend|freeze|hold|wait_for_input|breakpoint|checkpoint"
  language: any
  message: "No pause or suspend capability found for agent execution"
