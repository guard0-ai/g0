id: AA-HO-092
info:
  name: "Missing rollback mechanism"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent has no rollback mechanism to undo actions that produced undesired results. Operators must be able to revert agent-initiated changes when errors or safety issues are detected."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MANAGE-4.2, MANAGE-2.4]
    eu_ai_act: [Art14-1]
    iso42001: [A.8.2, A.8.6]
check:
  type: prompt_missing
  pattern: "rollback|undo|revert|restore|compensate|compensation_action|saga"
  language: any
  message: "No rollback or undo mechanism found for agent actions"
