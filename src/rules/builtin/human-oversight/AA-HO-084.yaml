id: AA-HO-084
info:
  name: "Missing audit for tool invocations"
  domain: human-oversight
  severity: high
  confidence: high
  description: "Tool invocations by the agent are not audited. Every tool call, including its parameters and result, should be logged to maintain a complete chain of custody."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.2]
    eu_ai_act: [Art14-4, Art12-1]
    iso42001: [A.6.2]
check:
  type: code_matches
  pattern: "\\b(tool_call|invoke_tool|run_tool|execute_tool|call_function)\\b(?!.*\\b(log|audit|record|track)\\b)"
  language: any
  message: "Tool invocations not being audited"
