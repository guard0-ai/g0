id: AA-HO-098
info:
  name: "Escalation dead ends"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Escalation paths lead to dead ends where no handler is configured or reachable. Every escalation path must terminate at a responsive human operator or team."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MANAGE-4.1, GOVERN-1.1]
    eu_ai_act: [Art14-3]
    iso42001: [A.8.2, A.6.2]
check:
  type: code_matches
  pattern: "\\bescalate\\b.*\\b(null|undefined|none|noop|pass|void|TODO)\\b"
  language: any
  message: "Escalation path leads to a dead end with no handler"
