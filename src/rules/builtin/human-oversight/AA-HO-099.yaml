id: AA-HO-099
info:
  name: "No timeout-based escalation"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent does not escalate when operations exceed time limits. Long-running or stuck operations should automatically escalate to human operators after a configurable timeout."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [MANAGE-4.1, MANAGE-2.4]
    eu_ai_act: [Art14-3]
    iso42001: [A.8.2]
check:
  type: prompt_missing
  pattern: "timeout_escalation|escalate_on_timeout|max_duration|execution_timeout|deadline_escalate"
  language: any
  message: "No timeout-based escalation mechanism found"
