id: AA-HO-115
info:
  name: "Blanket approval granted"
  domain: human-oversight
  severity: critical
  confidence: high
  description: "Agent is configured with blanket approval that pre-authorizes all actions without individual review. Each action should be evaluated and approved independently based on its risk and context."
  frameworks: [all]
  owasp_agentic: [ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.1]
    eu_ai_act: [Art14-1, Art14-3]
    iso42001: [A.8.2]
check:
  type: config_matches
  pattern: "approve_all|blanket_approval|auto_approve_all|global_approval|always_approve|pre_approved|skip_all_approval"
  language: any
  message: "Blanket approval configured - all actions pre-authorized without review"
