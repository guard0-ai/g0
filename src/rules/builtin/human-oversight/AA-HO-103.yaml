id: AA-HO-103
info:
  name: "No user consent before data collection"
  domain: human-oversight
  severity: critical
  confidence: high
  description: "Agent collects user data without obtaining consent first. Data collection must be preceded by clear consent request and explicit user agreement, especially for personal or sensitive data."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MAP-1.5]
    eu_ai_act: [Art14-1, Art15-1]
    iso42001: [A.8.5]
check:
  type: code_matches
  pattern: "\\b(collect_data|gather_info|store_user|save_profile|track_user|record_activity)\\b(?!.*\\b(consent|permission|agree|opt_in|authorize)\\b)"
  language: any
  message: "User data collected without obtaining consent"
