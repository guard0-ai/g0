id: AA-HO-105
info:
  name: "No informed consent display"
  domain: human-oversight
  severity: high
  confidence: medium
  description: "Agent does not display what data will be collected or how it will be used before requesting consent. Informed consent requires transparent disclosure of data practices."
  frameworks: [all]
  owasp_agentic: [ASI09, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.1, MAP-1.5]
    eu_ai_act: [Art14-1, Art15-1, Art13-1]
    iso42001: [A.8.5]
check:
  type: prompt_missing
  pattern: "privacy_notice|data_usage|consent_form|disclosure|privacy_policy|data_practices|inform_user"
  language: any
  message: "No informed consent disclosure before data collection"
