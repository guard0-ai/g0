id: AA-CE-081
info:
  name: "Cross-file user input flows to code execution"
  domain: code-execution
  severity: critical
  confidence: high
  description: "Untrusted user input from one module reaches eval/exec/subprocess in another module without sanitization. Cross-file taint flows are harder to spot in code review and commonly exploited via prompt injection."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.1]
    iso42001: ["A.5.3"]
    mitre_atlas: [AML.T0040]
    owasp_llm_top10: [LLM01]
check:
  type: cross_file_taint
  source: "(request\\.(body|params|query|form)|req\\.(body|params|query)|input\\(|sys\\.argv|raw_input|user_input|user_message|prompt_text)"
  sink: "(eval\\(|exec\\(|compile\\(|subprocess\\.(run|call|Popen)|os\\.(system|popen)\\(|child_process\\.(exec|spawn)|execSync|Function\\(|vm\\.run)"
  max_depth: 3
  language: any
  message: "User input crosses file boundaries to reach code execution sink — validate and sanitize at the boundary"
remediation: "Validate and sanitize user input before passing it across module boundaries. Use allowlists, parameterized APIs, or sandboxed execution environments instead of eval/exec."
suppressed_by: [input-validation, sandboxing]
