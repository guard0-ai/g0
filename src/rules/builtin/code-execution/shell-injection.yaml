id: AA-CE-061
info:
  name: "Shell injection via subprocess"
  domain: code-execution
  severity: critical
  confidence: high
  description: "subprocess with shell=True — shell injection risk"
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "subprocess\\.(run|call|Popen)\\(.*shell\\s*=\\s*True|ProcessBuilder\\(.*\\+|exec\\.Command\\(.*\\+"
  language: any
  message: "Shell injection risk — subprocess shell=True / ProcessBuilder / exec.Command with concatenation"
