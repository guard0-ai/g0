id: AA-CE-055
info:
  name: "LLM output flows to code execution"
  domain: code-execution
  severity: critical
  confidence: high
  description: "LLM-generated output is passed to a code execution function. A prompt injection attack could cause the LLM to produce malicious code that gets executed."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.1]
    iso42001: ["A.5.3"]
    mitre_atlas: [AML.T0040, AML.T0051]
    owasp_llm_top10: [LLM01, LLM02]
check:
  type: taint_flow
  sources:
    - pattern: "(completion\\.choices|response\\.content|message\\.content|chat_completion)"
    - pattern: "(llm\\.invoke|llm\\.predict|chain\\.invoke|agent\\.run|agent\\.invoke)"
    - pattern: "(generate_text|get_completion|ai_response|model_output|llm_output)"
    - pattern: "(openai\\.chat|anthropic\\.messages|response\\.text)"
  sinks:
    - pattern: "(eval\\(|exec\\(|compile\\(|subprocess\\.|os\\.system\\()"
    - pattern: "(child_process\\.exec|execSync|spawnSync|Function\\()"
    - pattern: "(vm\\.runInContext|vm\\.runInNewContext|new Function)"
  sanitizers:
    - pattern: "(sandbox|ast\\.literal_eval|json\\.loads|JSON\\.parse)"
    - pattern: "(validate_code|code_validator|allowlist|sanitize_code)"
  language: any
  message: "LLM output flows to code execution — prompt injection could trigger arbitrary code execution"
