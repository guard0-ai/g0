id: AA-CE-054
info:
  name: "User input flows to template rendering"
  domain: code-execution
  severity: high
  confidence: high
  description: "Untrusted input reaches a template engine without escaping. This enables server-side template injection (SSTI) leading to remote code execution."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    iso42001: ["A.5.3"]
    owasp_llm_top10: [LLM01]
check:
  type: taint_flow
  sources:
    - pattern: "(request\\.body|request\\.params|request\\.query|req\\.body|req\\.query)"
    - pattern: "(input\\(|sys\\.argv|user_input|user_message|template_input)"
  sinks:
    - pattern: "(Template\\(|render_template_string|Environment\\(|Jinja2)"
    - pattern: "(ejs\\.render|pug\\.render|handlebars\\.compile|nunjucks\\.renderString)"
    - pattern: "(string\\.Template|format_map\\(|Markup\\()"
  sanitizers:
    - pattern: "(escape|sanitize|bleach|markupsafe|autoescaping)"
    - pattern: "(DOMPurify|xss|encode_html)"
  language: any
  message: "Untrusted input flows to template rendering — template injection risk"
