id: AA-CE-079
info:
  name: "LLM-generated code executed directly"
  domain: code-execution
  severity: critical
  confidence: high
  description: "Code generated by an LLM is executed directly without review, sandboxing, or validation. An attacker who manipulates the LLM's output can achieve arbitrary code execution."
  frameworks: [all]
  owasp_agentic: [ASI05, ASI01]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
    owasp_llm_top10: [LLM05]
check:
  type: code_matches
  pattern: "(exec|eval|subprocess|system)\\(.*(response|completion|output|generated|llm_output|result)\\.?(text|content|code)?"
  language: any
  message: "LLM-generated code executed directly — prompt injection to RCE"
