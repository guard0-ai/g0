id: AA-CE-075
info:
  name: "Cross-language code execution"
  domain: code-execution
  severity: critical
  confidence: medium
  description: "Code invokes another language's interpreter (Python from JS, Lua from Python, etc.) with dynamic input. Cross-language boundaries make it harder to track taint and enforce sandboxing."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "(python|ruby|perl|lua|node|php)\\s+(-e|-c|--eval)\\s+.*\\+|PythonShell\\.run|child_process.*python"
  language: any
  message: "Cross-language code execution with dynamic input"
