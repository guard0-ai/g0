id: AA-CE-083
info:
  name: "Cross-file environment config flows to shell command"
  domain: code-execution
  severity: high
  confidence: medium
  description: "Environment variables or configuration values loaded in one module flow to shell command execution in another module. Attackers who control environment or config can achieve remote code execution."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.1]
    iso42001: ["A.5.3"]
    mitre_atlas: [AML.T0040]
check:
  type: cross_file_taint
  source: "(process\\.env\\[|os\\.environ\\[|os\\.getenv\\(|config\\.get\\(|dotenv|configparser|yaml\\.safe_load|Settings\\()"
  sink: "(os\\.system\\(|os\\.popen\\(|subprocess\\.(run|call|Popen|check_output)\\(|child_process\\.(exec|spawn)\\(|execSync\\(|spawnSync\\(|shell=True)"
  max_depth: 3
  language: any
  message: "Environment/config value crosses file boundaries to reach shell execution — validate config before use in commands"
remediation: "Validate and constrain configuration values with allowlists before passing them to shell commands. Use subprocess with shell=False and explicit argument lists."
suppressed_by: [input-validation, sandboxing]
