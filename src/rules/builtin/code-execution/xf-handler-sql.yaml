id: AA-CE-082
info:
  name: "Cross-file HTTP handler input flows to raw SQL"
  domain: code-execution
  severity: critical
  confidence: high
  description: "HTTP request data from a handler module reaches a raw SQL query in a data-access module without parameterization. This cross-file flow enables SQL injection attacks."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.1]
    iso42001: ["A.5.3"]
    mitre_atlas: [AML.T0040]
    owasp_llm_top10: [LLM01]
check:
  type: cross_file_taint
  source: "(request\\.(body|params|query|form|args|json)|req\\.(body|params|query)|ctx\\.(request|query|params)|event\\.(body|queryStringParameters))"
  sink: "(execute\\(.*[\"'`]\\s*(SELECT|INSERT|UPDATE|DELETE)|query\\(.*[\"'`]\\s*(SELECT|INSERT|UPDATE|DELETE)|raw\\(|rawQuery\\(|cursor\\.execute\\(|db\\.exec\\(|connection\\.query\\()"
  max_depth: 3
  language: any
  message: "HTTP handler input crosses file boundaries to reach raw SQL query — use parameterized queries"
remediation: "Use parameterized queries or prepared statements instead of string concatenation. Pass validated parameters across module boundaries, not raw request data."
suppressed_by: [input-validation]
