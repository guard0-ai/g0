id: AA-CE-031
info:
  name: "Expression Language injection"
  domain: code-execution
  severity: critical
  confidence: high
  description: "Spring Expression Language (SpEL) or OGNL evaluation with user input. EL injection enables arbitrary code execution on the server."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "SpelExpressionParser\\(\\)\\.parseExpression\\(|ExpressionParser.*parseExpression\\(.*\\+|OgnlUtil\\.getValue\\("
  language: java
  message: "Expression Language injection — SpEL/OGNL with dynamic input"
