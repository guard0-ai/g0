id: AA-CE-076
info:
  name: "Serialization gadget chain risk"
  domain: code-execution
  severity: critical
  confidence: medium
  description: "Code uses serialization libraries known for gadget chain vulnerabilities (Java ObjectInputStream, .NET BinaryFormatter, PHP unserialize). These can be exploited for remote code execution."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "(ObjectInputStream|BinaryFormatter|unserialize|Marshal\\.load|dill\\.loads?)\\("
  language: any
  message: "Deserialization with gadget chain risk — RCE vulnerability"
