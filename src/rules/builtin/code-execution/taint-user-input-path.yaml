id: AA-CE-052
info:
  name: "User input flows to file path"
  domain: code-execution
  severity: high
  confidence: high
  description: "Untrusted input is used to construct a file path without validation. This enables path traversal attacks to read/write arbitrary files."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    iso42001: ["A.5.3"]
    owasp_llm_top10: [LLM01]
check:
  type: taint_flow
  sources:
    - pattern: "(request\\.body|request\\.params|request\\.query|req\\.body|req\\.params)"
    - pattern: "(input\\(|sys\\.argv|user_input|filename|file_path|filepath)"
  sinks:
    - pattern: "(open\\(|readFile|writeFile|fs\\.read|fs\\.write|fs\\.unlink)"
    - pattern: "(path\\.join|path\\.resolve|os\\.path\\.join)"
    - pattern: "(shutil\\.copy|shutil\\.move|os\\.rename|os\\.remove)"
  sanitizers:
    - pattern: "(path\\.basename|path\\.normalize|realpath|abspath)"
    - pattern: "(sanitize_filename|secure_filename|validate_path)"
    - pattern: "(\\.startsWith\\(|allowlist|whitelist)"
  language: any
  message: "Untrusted input flows to file path operation — path traversal risk"
