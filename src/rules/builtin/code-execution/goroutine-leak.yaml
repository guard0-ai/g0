id: AA-CE-034
info:
  name: "Goroutine leak in agent loop"
  domain: code-execution
  severity: medium
  confidence: medium
  description: "Unbounded goroutine spawning in an agent loop without context cancellation or WaitGroup. This leads to goroutine leaks that exhaust memory over time."
  frameworks: [all]
  owasp_agentic: [ASI05, ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "for\\s*\\{[^}]*go\\s+func|for\\s+.*range.*\\{[^}]*go\\s+func"
  language: go
  message: "Goroutine leak risk — unbounded goroutine spawning in loop"
