id: AA-CE-077
info:
  name: "Prototype pollution to code execution"
  domain: code-execution
  severity: critical
  confidence: medium
  description: "Code performs deep merge or recursive property assignment on user-controlled objects. Prototype pollution can lead to code execution via poisoned constructor or __proto__ chains."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "(deepMerge|deepAssign|lodash\\.merge|\\.\\.\\.|Object\\.assign)\\(.*\\b(body|params|query|input)\\b"
  language: any
  message: "Deep merge with user input — prototype pollution to RCE risk"
