id: AA-CE-056
info:
  name: "LLM output flows to file operations"
  domain: code-execution
  severity: high
  confidence: high
  description: "LLM-generated output determines file paths or content for write operations. A prompt injection could cause the agent to write to arbitrary locations or overwrite critical files."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    iso42001: ["A.5.3"]
    owasp_llm_top10: [LLM01]
check:
  type: taint_flow
  sources:
    - pattern: "(completion\\.choices|response\\.content|message\\.content|chat_completion)"
    - pattern: "(llm\\.invoke|llm\\.predict|chain\\.invoke|agent\\.run|agent\\.invoke)"
    - pattern: "(ai_response|model_output|llm_output|generated_text)"
  sinks:
    - pattern: "(open\\(.*['\"]w|writeFile|fs\\.write|fs\\.appendFile)"
    - pattern: "(shutil\\.copy|shutil\\.move|os\\.rename|os\\.makedirs)"
    - pattern: "(path\\.join|path\\.resolve)"
  sanitizers:
    - pattern: "(sanitize_filename|secure_filename|validate_path|basename)"
    - pattern: "(allowlist|whitelist|path\\.normalize|realpath)"
  language: any
  message: "LLM output flows to file operations — agent could write to arbitrary paths"
