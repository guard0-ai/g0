id: AA-CE-050
info:
  name: "User input flows to code execution"
  domain: code-execution
  severity: critical
  confidence: high
  description: "Untrusted user input reaches a code execution sink (eval, exec, subprocess) without sanitization. This enables arbitrary code execution via prompt injection or malicious input."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.1]
    iso42001: ["A.5.3"]
    mitre_atlas: [AML.T0040]
    owasp_llm_top10: [LLM01]
check:
  type: taint_flow
  sources:
    - pattern: "(request\\.body|request\\.params|request\\.query|req\\.body|req\\.params|req\\.query)"
    - pattern: "(input\\(|stdin|sys\\.argv|raw_input)"
    - pattern: "(prompt|user_input|user_message|human_input|user_query)"
  sinks:
    - pattern: "(eval\\(|exec\\(|compile\\(|subprocess\\.|os\\.system\\(|os\\.popen\\()"
    - pattern: "(child_process\\.exec|child_process\\.spawn|execSync|spawnSync)"
    - pattern: "(Function\\(|vm\\.runInContext|vm\\.runInNewContext)"
  sanitizers:
    - pattern: "(escape|sanitize|validate|parseInt|Number\\(|parseFloat)"
    - pattern: "(ast\\.literal_eval|json\\.loads|json\\.parse|JSON\\.parse)"
    - pattern: "(allowlist|whitelist|shlex\\.quote|shellescape)"
  language: any
  message: "Untrusted input flows to code execution without sanitization"
