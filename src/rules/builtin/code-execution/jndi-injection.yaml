id: AA-CE-030
info:
  name: "JNDI injection risk"
  domain: code-execution
  severity: critical
  confidence: high
  description: "InitialContext.lookup() with user-controlled input enables JNDI injection (Log4Shell-style). Attackers can load remote classes via LDAP/RMI URLs."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
    mitre_atlas: [AML.T0040]
check:
  type: code_matches
  pattern: "InitialContext\\(\\)\\.lookup\\(|ctx\\.lookup\\(.*\\+|NamingManager\\.getInitialContext"
  language: java
  message: "JNDI injection risk — InitialContext.lookup with dynamic input"
