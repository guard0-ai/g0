id: AA-IA-095
info:
  name: "Overprivileged agent service account"
  domain: identity-access
  severity: high
  confidence: medium
  description: "Agent runs with admin or root-level service account permissions. The principle of least privilege requires agents to run with minimal necessary permissions."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    eu_ai_act: [Article 14]
check:
  type: code_matches
  pattern: "(admin|root|superuser|\\*:\\*|AdministratorAccess|PowerUser).*=.*true|role.*=.*[\"'](admin|root|superuser)"
  language: any
  message: "Agent runs with overprivileged service account"
