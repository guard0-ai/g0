id: AA-IA-080
info:
  name: "Weak password policy"
  domain: identity-access
  severity: medium
  confidence: medium
  description: "Password validation lacks strength requirements. Weak passwords make brute-force and credential stuffing attacks feasible."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(password|passwd).*len(gth)?\\s*[<>=]+\\s*[1-7]\\b|min.?length.*[=:]\\s*[1-7]\\b"
  language: any
  message: "Password minimum length too short — weak password policy"
