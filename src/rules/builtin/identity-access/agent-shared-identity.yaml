id: AA-IA-089
info:
  name: "Agent uses shared identity for all operations"
  domain: identity-access
  severity: high
  confidence: medium
  description: "Agent uses a single shared identity or service account for all operations regardless of the requesting user. This violates the principle of least privilege and prevents per-user audit trails."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(service_account|shared_key|master_key|admin_token)\\s*=\\s*[\"']|credentials.*=.*SERVICE_ACCOUNT"
  language: any
  message: "Agent uses shared identity for all operations — no per-user access control"
