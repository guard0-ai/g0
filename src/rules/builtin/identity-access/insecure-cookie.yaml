id: AA-IA-085
info:
  name: "Insecure session cookie settings"
  domain: identity-access
  severity: high
  confidence: high
  description: "Session cookies are set without Secure, HttpOnly, or SameSite attributes. This exposes session tokens to theft via XSS, network interception, or CSRF attacks."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(set_cookie|setCookie|cookie)\\((?!.*(secure|httponly|samesite|HttpOnly|Secure|SameSite))"
  language: any
  message: "Session cookie without security attributes"
