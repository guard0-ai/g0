id: AA-IA-073
info:
  name: "RBAC bypass via role parameter manipulation"
  domain: identity-access
  severity: critical
  confidence: medium
  description: "Role-based access control relies on a user-controllable parameter. An attacker can modify the role parameter to escalate privileges and access admin-level agent functionality."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    owasp_llm_top10: [LLM06]
check:
  type: code_matches
  pattern: "role\\s*=\\s*(request|req|input|param|body)\\.(role|user_role|access_level)"
  language: any
  message: "Role derived from user-controllable parameter — RBAC bypass risk"
