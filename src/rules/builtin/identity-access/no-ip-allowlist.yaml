id: AA-IA-099
info:
  name: "No IP allowlist for agent API"
  domain: identity-access
  severity: medium
  confidence: medium
  description: "Agent API is accessible from any IP address without allowlist restrictions. Network-level access control provides defense-in-depth against credential compromise."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: config_matches
  pattern: "host.*0\\.0\\.0\\.0|listen.*\\*|bind.*0\\.0\\.0\\.0"
  message: "Agent API binds to all interfaces without IP allowlist"
