id: AA-IA-078
info:
  name: "Privilege escalation via agent tool chain"
  domain: identity-access
  severity: critical
  confidence: medium
  description: "Agent can chain tools to escalate privileges — for example, reading a database to find admin credentials, then using those credentials in another tool call."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tools\\s*=\\s*\\[.*((read|query|find).*(auth|credential|password|admin)).*\\]"
  language: any
  message: "Tool chain enables privilege escalation — read credential + use credential pattern"
