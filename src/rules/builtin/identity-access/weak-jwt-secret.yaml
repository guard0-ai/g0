id: AA-IA-098
info:
  name: "Weak JWT signing secret"
  domain: identity-access
  severity: critical
  confidence: high
  description: "JWT tokens are signed with a weak or short secret. An attacker can brute-force short JWT secrets to forge valid tokens."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(jwt_secret|SECRET_KEY|signing_key)\\s*=\\s*[\"'][a-zA-Z0-9]{1,20}[\"']"
  language: any
  message: "JWT signing secret is too short — brute-force risk"
