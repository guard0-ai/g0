id: AA-IA-050
info:
  name: "Spring Security misconfiguration"
  domain: identity-access
  severity: high
  confidence: medium
  description: "Spring Security permitAll() on sensitive paths or csrf().disable() without justification. Agent API endpoints without authentication allow unauthorized access to AI capabilities."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "permitAll\\(\\).*/(api|agent|chat|completion|tool)|csrf\\(\\)\\.disable\\(\\)|httpBasic\\(\\)\\.disable\\(\\)"
  language: java
  message: "Spring Security misconfiguration — sensitive endpoints unprotected"
