id: AA-IA-074
info:
  name: "Broken Object Level Authorization (BOLA)"
  domain: identity-access
  severity: critical
  confidence: medium
  description: "Agent accesses resources using user-supplied IDs without verifying the user owns or has access to the referenced object. An attacker can access other users' data by changing the object ID."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    owasp_llm_top10: [LLM06]
check:
  type: code_matches
  pattern: "(find_by_id|get_by_id|findById|getById)\\(\\s*(id|param|request|req\\.params)(?!.*user_id|.*owner|.*authorize)"
  language: any
  message: "Object accessed by user-supplied ID without ownership check — BOLA risk"
