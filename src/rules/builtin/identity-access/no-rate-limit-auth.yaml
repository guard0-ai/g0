id: AA-IA-086
info:
  name: "No rate limit on authentication endpoint"
  domain: identity-access
  severity: high
  confidence: medium
  description: "Authentication endpoint lacks rate limiting, enabling brute-force and credential stuffing attacks against agent authentication."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(login|authenticate|sign_in|token).*\\((?!.*rate_limit|.*throttle|.*limiter|.*attempts)"
  language: any
  message: "Auth endpoint without rate limiting — brute-force risk"
