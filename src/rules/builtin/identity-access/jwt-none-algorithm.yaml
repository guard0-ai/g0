id: AA-IA-084
info:
  name: "JWT with none algorithm accepted"
  domain: identity-access
  severity: critical
  confidence: high
  description: "JWT verification accepts the 'none' algorithm, allowing attackers to forge tokens without a signature. This effectively disables JWT authentication."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(algorithm|algorithms).*[\"'](none|None)[\"']|verify.*=.*False"
  language: any
  message: "JWT accepts 'none' algorithm — token forgery risk"
