id: AA-IA-052
info:
  name: "Hardcoded secret in Java agent"
  domain: identity-access
  severity: critical
  confidence: high
  description: "Hardcoded API key or secret string in Java source code. Secrets committed to source code can be extracted from git history and CI/CD logs."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "String\\s+\\w*(key|secret|token|password|apiKey|api_key)\\w*\\s*=\\s*\"(sk-|ghp_|gho_|AKIA|xox[bpas]-)"
  language: java
  message: "Hardcoded secret in Java code — credential exposure"
