id: AA-IA-082
info:
  name: "OAuth misconfiguration"
  domain: identity-access
  severity: high
  confidence: medium
  description: "OAuth implementation uses insecure settings such as implicit flow, missing state parameter, or overly broad scopes. These misconfigurations can lead to token theft or unauthorized access."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(response_type.*=.*token|grant_type.*implicit|scope.*[\"']\\*[\"']|(?<!state.*=.*\\w).*(authorize|auth)\\()"
  language: any
  message: "OAuth misconfiguration detected — token theft risk"
