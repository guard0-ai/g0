id: AA-IA-088
info:
  name: "No principal validation for agent actions"
  domain: identity-access
  severity: high
  confidence: medium
  description: "Agent performs actions without validating the identity of the requesting principal. Without principal validation, the agent cannot enforce access controls or audit who triggered each action."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    iso42001: ["9.2"]
check:
  type: agent_property
  property: principalValidation
  condition: missing
  message: "Agent lacks principal validation for action authorization"
