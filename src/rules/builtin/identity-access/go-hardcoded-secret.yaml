id: AA-IA-053
info:
  name: "Hardcoded secret in Go agent"
  domain: identity-access
  severity: critical
  confidence: high
  description: "Hardcoded API key or secret string in Go source code. Secrets committed to source code can be extracted from git history and CI/CD logs."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(?:key|secret|token|password|apiKey)\\s*(?::=|=)\\s*\"(sk-|ghp_|gho_|AKIA|xox[bpas]-)"
  language: go
  message: "Hardcoded secret in Go code — credential exposure"
