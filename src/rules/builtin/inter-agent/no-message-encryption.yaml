id: AA-IC-083
info:
  name: "No message encryption for inter-agent traffic"
  domain: inter-agent
  severity: high
  confidence: medium
  description: "Messages exchanged between agents are transmitted in plaintext, exposing sensitive data and instructions to eavesdropping."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    eu_ai_act: [ART-15]
check:
  type: code_matches
  pattern: "send_message\\(|dispatch_to_agent\\(|forward_to\\(|relay_message\\("
  language: any
  message: "Agent message dispatch detected without encryption wrapper"
