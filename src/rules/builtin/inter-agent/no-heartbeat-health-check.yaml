id: AA-IC-128
info:
  name: "No heartbeat or health check between agents"
  domain: inter-agent
  severity: medium
  confidence: medium
  description: "Agents do not perform health checks on peer agents, so a crashed or compromised agent continues to be trusted and sent messages."
  frameworks: [all]
  owasp_agentic: [ASI03, ASI09]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MEASURE-4.2]
check:
  type: prompt_missing
  pattern: "heartbeat|health\\s+check|ping.*pong|keep.alive|agent\\s+status|liveness\\s+probe"
  message: "No heartbeat or health check mechanism found for agent liveness"
