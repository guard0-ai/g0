id: AA-IC-105
info:
  name: "Unsynchronized shared state between agents"
  domain: inter-agent
  severity: high
  confidence: medium
  description: "Multiple agents read and write to shared state without synchronization primitives, leading to data races and inconsistent agent behavior."
  frameworks: [all]
  owasp_agentic: [ASI08]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "shared_state|global_state|common_memory|shared_context|agent_state\\[|shared_dict"
  language: any
  message: "Shared state accessed by multiple agents without synchronization"
