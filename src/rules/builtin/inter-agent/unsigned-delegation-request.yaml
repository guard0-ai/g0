id: AA-IC-087
info:
  name: "Unsigned delegation request"
  domain: inter-agent
  severity: high
  confidence: high
  description: "Agent delegation requests are not signed by the delegating agent, allowing any agent to forge delegation instructions and hijack task execution."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2, GOVERN-6.1]
check:
  type: code_matches
  pattern: "delegate_to\\(|assign_task\\(|hand_off\\(|transfer_to_agent\\(|forward_task\\("
  language: any
  message: "Delegation request issued without cryptographic signature"
