id: AA-IC-113
info:
  name: "No agent identity verification"
  domain: inter-agent
  severity: critical
  confidence: high
  description: "Agents do not verify the identity of other agents before accepting messages or delegations, enabling agent impersonation attacks."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MAP-3.5]
    mitre_atlas: [AML.T0048]
check:
  type: prompt_missing
  pattern: "verify\\s+agent|agent\\s+identity|authenticate\\s+agent|agent\\s+certificate|agent\\s+id\\s+check"
  message: "No agent identity verification mechanism found"
