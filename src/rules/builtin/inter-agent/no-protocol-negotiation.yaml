id: AA-IC-125
info:
  name: "No protocol negotiation between agents"
  domain: inter-agent
  severity: medium
  confidence: medium
  description: "Agents communicate without establishing a mutually agreed protocol, leading to message misinterpretation or incompatible communication."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: prompt_missing
  pattern: "protocol\\s+negotiat|handshake|capability\\s+exchange|protocol\\s+agreement|establish.*channel"
  message: "No protocol negotiation or handshake found between agents"
