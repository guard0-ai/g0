id: AA-IC-143
info:
  name: "No channel authentication"
  domain: inter-agent
  severity: high
  confidence: medium
  description: "Agent communication channels lack authentication, allowing any process to connect and send messages posing as a legitimate agent."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "open_channel\\(|create_channel\\(|connect_agent\\(|agent_socket\\(|listen_for_agents\\("
  language: any
  message: "Agent communication channel opened without authentication"
