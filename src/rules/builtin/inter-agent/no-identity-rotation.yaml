id: AA-IC-120
info:
  name: "No agent identity rotation"
  domain: inter-agent
  severity: medium
  confidence: medium
  description: "Agent credentials and identity tokens are never rotated, meaning a single compromise provides permanent access."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MEASURE-4.2]
check:
  type: prompt_missing
  pattern: "rotat.*identity|rotat.*credential|key\\s+rotation|token\\s+refresh|credential\\s+renewal|periodic.*rekey"
  message: "No identity or credential rotation policy found for agents"
