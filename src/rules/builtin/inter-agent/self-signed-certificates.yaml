id: AA-IC-144
info:
  name: "Self-signed certificates for agent communication"
  domain: inter-agent
  severity: medium
  confidence: medium
  description: "Agent communication relies on self-signed certificates without a proper CA chain, undermining certificate-based trust and enabling impersonation."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "self_signed|generate_self_cert|openssl.*req.*-x509.*-new|makecert|create_self_signed"
  language: any
  message: "Self-signed certificate used for agent communication channel"
