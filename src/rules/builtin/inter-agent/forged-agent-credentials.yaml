id: AA-IC-118
info:
  name: "Forged agent credentials"
  domain: inter-agent
  severity: critical
  confidence: medium
  description: "Agent credentials (tokens, keys) are generated without proper cryptographic controls, allowing attackers to forge valid-looking agent credentials."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    mitre_atlas: [AML.T0048]
check:
  type: code_matches
  pattern: "agent_token\\s*=\\s*[\"']|generate_token\\(.*name|token\\s*=\\s*base64|simple_token|md5.*agent"
  language: any
  message: "Agent credentials use weak or predictable generation method"
