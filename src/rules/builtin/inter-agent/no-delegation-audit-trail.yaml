id: AA-IC-094
info:
  name: "No delegation audit trail"
  domain: inter-agent
  severity: medium
  confidence: high
  description: "Agent delegation events are not logged or audited, making it impossible to trace the chain of responsibility for delegated task outcomes."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-6.1, MEASURE-4.2]
    eu_ai_act: [ART-12]
check:
  type: prompt_missing
  pattern: "log.*delegation|audit.*delegat|track.*delegation|delegation.*log|delegation.*record"
  message: "No audit trail found for inter-agent delegation events"
