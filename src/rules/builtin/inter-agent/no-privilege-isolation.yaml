id: AA-IC-099
info:
  name: "No privilege isolation between agents"
  domain: inter-agent
  severity: high
  confidence: medium
  description: "Agents in a multi-agent system run with identical permissions rather than following least-privilege principle, so any compromised agent has full system access."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [GOVERN-6.1]
check:
  type: prompt_missing
  pattern: "privilege\\s+isolat|permission\\s+boundar|role.based\\s+access|agent\\s+permission|least\\s+privilege"
  message: "No privilege isolation configured between agents in multi-agent system"
