id: AA-IC-121
info:
  name: "Missing protocol version check"
  domain: inter-agent
  severity: medium
  confidence: high
  description: "Inter-agent communication does not include protocol version negotiation, risking incompatible message handling or exploitation of older protocol vulnerabilities."
  frameworks: [all]
  owasp_agentic: [ASI03]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: prompt_missing
  pattern: "protocol\\s+version|api\\s+version|version\\s+negotiat|compat.*check|schema\\s+version"
  message: "No protocol version check found in inter-agent communication"
