id: AA-IC-122
info:
  name: "No message format validation"
  domain: inter-agent
  severity: medium
  confidence: high
  description: "Incoming inter-agent messages are processed without validating their format or structure, allowing injection of malformed payloads."
  frameworks: [all]
  owasp_agentic: [ASI03, ASI01]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "message\\.content|msg\\.data|payload\\.text|request\\.body|event\\.message"
  language: any
  message: "Agent processes incoming message content without format validation"
