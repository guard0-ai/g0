id: AA-IC-089
info:
  name: "Unbounded delegation depth"
  domain: inter-agent
  severity: critical
  confidence: high
  description: "Agent delegation chains have no maximum depth limit, allowing infinite delegation loops that exhaust resources or obscure accountability."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI09]
  standards:
    nist_ai_rmf: [GOVERN-6.1, MEASURE-2.6]
check:
  type: prompt_missing
  pattern: "max.delegation.depth|delegation.limit|max.hops|delegation.chain.limit"
  message: "No maximum delegation depth configured for agent delegation chains"
