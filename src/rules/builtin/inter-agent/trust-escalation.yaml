id: AA-IC-131
info:
  name: "Trust escalation between agents"
  domain: inter-agent
  severity: high
  confidence: medium
  description: "An agent can elevate its trust level through interaction with trusted agents, gaining access to resources beyond its original trust level."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-6.1, MAP-3.5]
    mitre_atlas: [AML.T0048]
check:
  type: code_matches
  pattern: "elevate_trust|promote_agent|increase_trust|trust_level.*\\+|upgrade_access|boost_privilege"
  language: any
  message: "Agent trust level can be dynamically escalated"
