id: AA-IC-127
info:
  name: "Protocol state confusion"
  domain: inter-agent
  severity: high
  confidence: medium
  description: "Inter-agent protocol does not track conversation or session state, allowing out-of-order messages to cause unexpected behavior or bypass security checks."
  frameworks: [all]
  owasp_agentic: [ASI03, ASI01]
  standards:
    nist_ai_rmf: [MEASURE-2.6]
check:
  type: code_matches
  pattern: "process_message\\(|handle_message\\(|on_message\\(|message_handler\\("
  language: any
  message: "Agent message processing lacks protocol state tracking"
