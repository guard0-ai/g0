id: AA-IC-102
info:
  name: "No least-privilege enforcement for agents"
  domain: inter-agent
  severity: high
  confidence: high
  description: "Agents are granted broad permissions rather than the minimum required for their specific task, increasing blast radius if an agent is compromised."
  frameworks: [all]
  owasp_agentic: [ASI05]
  standards:
    nist_ai_rmf: [GOVERN-6.1]
    eu_ai_act: [ART-15]
check:
  type: code_matches
  pattern: "permissions?\\s*[=:]\\s*[\"']\\*|grant_all|all_permissions|full_access|admin_access"
  language: any
  message: "Agent granted wildcard or full permissions instead of least-privilege"
