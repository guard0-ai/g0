id: AA-IC-129
info:
  name: "No trust boundary enforcement"
  domain: inter-agent
  severity: critical
  confidence: high
  description: "Multi-agent system has no defined trust boundaries, treating all agents as equally trusted regardless of their origin, capability level, or security posture."
  frameworks: [all]
  owasp_agentic: [ASI07, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-6.1, MAP-3.5]
    eu_ai_act: [ART-15]
check:
  type: prompt_missing
  pattern: "trust\\s+boundar|security\\s+zone|trust\\s+domain|agent\\s+tier|trust\\s+level|security\\s+perimeter"
  message: "No trust boundary definitions found for multi-agent system"
