id: AA-IC-140
info:
  name: "Missing certificate validation"
  domain: inter-agent
  severity: critical
  confidence: high
  description: "Agent communication skips certificate validation, allowing man-in-the-middle attacks with self-signed or invalid certificates."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "verify_certs?\\s*=\\s*False|rejectUnauthorized\\s*:\\s*false|InsecureRequestWarning|NODE_TLS_REJECT_UNAUTHORIZED"
  language: any
  message: "Certificate validation disabled for agent communication"
