id: AA-IC-082
info:
  name: "Missing message signature"
  domain: inter-agent
  severity: high
  confidence: high
  description: "Inter-agent messages are not cryptographically signed, allowing any agent to forge messages claiming to be from another agent."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI06]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MAP-3.5]
check:
  type: prompt_missing
  pattern: "sign(ed)?\\s+(message|payload|request)|message\\s+signature|hmac|digital\\s+signature"
  message: "No message signing mechanism found for inter-agent communication"
