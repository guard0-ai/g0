id: AA-GI-094
info:
  name: "No input validation before prompt construction"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "User input is used to construct prompts without any validation or sanitization. This allows arbitrary content injection into the agent's instruction stream."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    owasp_llm_top10: [LLM01]
check:
  type: code_matches
  pattern: "(ChatPromptTemplate|PromptTemplate|SystemMessage).*\\b(user_input|request\\.body|req\\.body|args\\[)"
  language: any
  message: "User input used in prompt construction without validation"
