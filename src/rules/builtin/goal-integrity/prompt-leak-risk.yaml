id: AA-GI-072
info:
  name: "Prompt contains self-disclosure language"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt contains language that references or discloses system-level instructions, prompts, or rules. This indicates either intentional prompt leakage or a vulnerability where the agent may expose its own configuration to users."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "here (is|are) (my|the|your) (system )?(prompt|instructions|rules)"
  message: "Prompt contains self-disclosure language — system prompt may be leaked to users"
