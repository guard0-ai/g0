id: AA-GI-109
info:
  name: "Recursive self-improvement prompt"
  domain: goal-integrity
  severity: critical
  confidence: medium
  description: "Prompt instructs the agent to modify its own instructions, improve itself, or update its system prompt. Self-modifying behavior can lead to uncontrolled goal drift and safety violations."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    eu_ai_act: [Article 14]
check:
  type: prompt_contains
  pattern: "(modify|update|change|improve|rewrite)\\s+(your|the|its)\\s+(own )?(system prompt|instructions|rules|behavior|programming)"
  prompt_type: any
  message: "Prompt instructs agent to modify its own instructions — self-improvement risk"
