id: AA-GI-075
info:
  name: "Goal manipulation via few-shot examples"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "System prompt uses few-shot examples that could be exploited to override the agent's intended goal. Adversarial few-shot examples can demonstrate goal-violating behavior the agent may mimic."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(example|few.shot|demonstration).*\\n.*(ignore|override|bypass)"
  prompt_type: any
  message: "Few-shot examples may enable goal manipulation"
