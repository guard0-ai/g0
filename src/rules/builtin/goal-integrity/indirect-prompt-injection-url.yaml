id: AA-GI-077
info:
  name: "Indirect prompt injection via URL content"
  domain: goal-integrity
  severity: critical
  confidence: medium
  description: "Agent fetches external URLs whose content could contain prompt injection payloads. When an agent reads web pages, documents, or API responses, embedded instructions can override the agent's goal."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI02]
  standards:
    nist_ai_rmf: [MAP-1.5, MEASURE-2.6]
check:
  type: code_matches
  pattern: "(fetch|requests\\.get|axios\\.get|urllib|httpx\\.get)\\(.*\\).*\\b(prompt|messages|content)"
  language: any
  message: "External URL content fed into prompt without sanitization — indirect injection risk"
