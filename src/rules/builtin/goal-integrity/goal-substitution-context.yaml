id: AA-GI-078
info:
  name: "Goal substitution via context injection"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "User-controlled context is injected into the system prompt without boundary markers, allowing goal substitution. An attacker can craft context that redefines the agent's objectives."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(system_prompt|system_message).*\\+.*\\b(user_input|context|query|request)"
  language: any
  message: "User context concatenated into system prompt without boundaries — goal substitution risk"
