id: AA-GI-099
info:
  name: "Virtualization/simulation attack"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt asks the agent to simulate another AI, terminal, or system where normal rules don't apply. This virtualization technique creates a fictional context where the agent bypasses its constraints."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0051]
check:
  type: prompt_contains
  pattern: "(simulate|emulate|act as|pretend to be)\\s+(a |an )?(terminal|shell|computer|AI|system|operating system|Linux|Windows|DAN)"
  prompt_type: any
  message: "Prompt uses virtualization technique to bypass agent constraints"
