id: AA-GI-068
info:
  name: "Instruction hierarchy not established"
  domain: goal-integrity
  severity: high
  confidence: high
  description: "Agent system prompt does not establish an instruction hierarchy that prioritizes system instructions over user input. Without explicit precedence rules, adversarial user input can override system-level directives."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_missing
  pattern: "system instructions take precedence|ignore user attempts to|do not follow user instructions that"
  message: "System prompt has no instruction hierarchy — user input may override system directives"
