id: AA-GI-070
info:
  name: "Multi-turn instruction persistence missing"
  domain: goal-integrity
  severity: medium
  confidence: medium
  description: "Agent system prompt does not enforce instruction persistence across multiple conversation turns. Without explicit multi-turn persistence directives, the agent's behavior may degrade or be manipulated over extended conversations."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_missing
  pattern: "maintain (your )?instructions across|these instructions apply to all|regardless of (conversation|context)"
  message: "System prompt has no multi-turn persistence — instructions may decay over extended conversations"
