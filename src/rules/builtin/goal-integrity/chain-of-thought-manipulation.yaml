id: AA-GI-096
info:
  name: "Chain-of-thought manipulation"
  domain: goal-integrity
  severity: medium
  confidence: medium
  description: "Prompt attempts to manipulate the agent's chain-of-thought reasoning process by injecting intermediate reasoning steps that lead to goal-violating conclusions."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(let's think|step by step|first,? (we|you) (should|need to|must))\\s*.*(ignore|bypass|skip|override)"
  prompt_type: any
  message: "Prompt manipulates chain-of-thought to bypass goal constraints"
