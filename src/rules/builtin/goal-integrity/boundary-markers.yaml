id: AA-GI-061
info:
  name: "Instruction boundary markers missing"
  domain: goal-integrity
  severity: high
  confidence: high
  description: "Agent system prompt lacks clear instruction boundary markers such as BEGIN_INSTRUCTIONS/END_INSTRUCTIONS or <system></system> tags. Without explicit delimiters, injected content can blur the boundary between trusted instructions and untrusted data."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_missing
  pattern: "(BEGIN_INSTRUCTIONS|END_INSTRUCTIONS|<system>|</system>|---INSTRUCTIONS---|\\[INST\\]|\\[/INST\\])"
  message: "System prompt has no instruction boundary markers — injected content may bypass instruction boundaries"
