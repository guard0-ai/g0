id: AA-GI-073
info:
  name: "Agent has no system prompt"
  domain: goal-integrity
  severity: high
  confidence: high
  description: "Agent is configured without a system prompt. Without any system-level instructions, the agent has no defined behavior boundaries, making it fully susceptible to arbitrary manipulation through user input."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: agent_property
  property: systemPrompt
  condition: missing
  message: "Agent has no system prompt — vulnerable to unbounded behavior"
