id: AA-GI-083
info:
  name: "Missing goal anchoring in system prompt"
  domain: goal-integrity
  severity: medium
  confidence: medium
  description: "System prompt does not explicitly state the agent's primary goal or purpose. Without clear goal anchoring, the agent is more susceptible to goal drift and manipulation."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    iso42001: ["6.1"]
check:
  type: prompt_missing
  pattern: "(your (primary |main |core )?(goal|purpose|objective|task|mission) is|you (must|should|are designed to))"
  prompt_type: system
  message: "System prompt lacks explicit goal anchoring statement"
