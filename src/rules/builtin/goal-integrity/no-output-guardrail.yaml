id: AA-GI-102
info:
  name: "No output guardrail configured"
  domain: goal-integrity
  severity: medium
  confidence: medium
  description: "Agent does not have output guardrails or validators configured. Without output validation, the agent may produce responses that violate its goal constraints without detection."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    iso42001: ["8.4"]
check:
  type: agent_property
  property: outputGuardrail
  condition: missing
  message: "Agent lacks output guardrail configuration"
