id: AA-GI-095
info:
  name: "Markdown injection in prompt"
  domain: goal-integrity
  severity: medium
  confidence: medium
  description: "Prompt contains markdown image links or other markdown constructs that could exfiltrate data or inject content when rendered. Markdown images can trigger outbound requests with sensitive data."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "!\\[.*\\]\\(http|\\[.*\\]\\(javascript:|\\[.*\\]\\(data:"
  prompt_type: any
  message: "Prompt contains markdown injection pattern that may exfiltrate data"
