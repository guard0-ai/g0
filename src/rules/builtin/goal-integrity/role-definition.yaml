id: AA-GI-063
info:
  name: "Role definition missing from system prompt"
  domain: goal-integrity
  severity: medium
  confidence: high
  description: "Agent system prompt does not contain a clear role definition. Without an explicit identity and purpose, the agent is more susceptible to role-hijacking attacks where adversarial input redefines its behavior."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_missing
  pattern: "(you are a|your role is|act as|you serve as|your purpose is|you function as)"
  message: "System prompt has no role definition — agent is vulnerable to role hijacking"
