id: AA-GI-098
info:
  name: "Payload splitting attack"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt splits a malicious payload across multiple messages or turns to evade single-message detection. Each fragment appears benign individually but combines into an injection attack."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(combine|concatenate|join|merge)\\s+(the |these |all )?(previous|above|earlier)\\s+(messages|parts|fragments|pieces)"
  prompt_type: any
  message: "Prompt may use payload splitting to evade injection detection"
