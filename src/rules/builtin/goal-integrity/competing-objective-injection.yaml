id: AA-GI-110
info:
  name: "Competing objective injection"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt introduces competing objectives that conflict with the agent's primary goal. By framing alternative objectives as equally important, attackers can divert the agent from its intended purpose."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(more important|higher priority|override|supersede|take(s)? precedence over)\\s+(your|the|any)\\s+(original|previous|current|primary)"
  prompt_type: any
  message: "Prompt injects competing objectives that may override primary goal"
