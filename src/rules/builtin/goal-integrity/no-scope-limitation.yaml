id: AA-GI-115
info:
  name: "No scope limitation in system prompt"
  domain: goal-integrity
  severity: medium
  confidence: medium
  description: "System prompt does not define the scope of topics or tasks the agent should handle. Without scope limits, the agent can be directed to perform any task, including harmful ones."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    iso42001: ["6.1"]
check:
  type: prompt_missing
  pattern: "(only (handle|respond|answer|help)|limited to|scope (is|includes)|do not (discuss|help with)|outside (your|the) scope)"
  prompt_type: system
  message: "System prompt lacks scope limitation for agent tasks"
