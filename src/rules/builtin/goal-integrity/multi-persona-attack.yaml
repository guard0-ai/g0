id: AA-GI-090
info:
  name: "Multi-persona attack pattern"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt creates multiple personas or voices to confuse the agent about which instructions to follow. By introducing conflicting personas, attackers can undermine the agent's primary goal."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(persona|character|voice)\\s*(1|2|3|A|B|one|two)|switch (to|between) (personas|characters|modes)"
  prompt_type: any
  message: "Prompt uses multi-persona pattern that may confuse agent goal adherence"
