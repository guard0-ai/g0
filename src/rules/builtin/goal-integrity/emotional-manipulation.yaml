id: AA-GI-103
info:
  name: "Emotional manipulation in prompt"
  domain: goal-integrity
  severity: medium
  confidence: low
  description: "Prompt uses emotional manipulation (urgency, fear, sympathy) to pressure the agent into violating its goal constraints. Emotional appeals can override safety guardrails in some models."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(this is (an |a )?(emergency|urgent|life.threatening|critical)|someone (will|could) (die|be hurt)|please.*I'm (desperate|begging))"
  prompt_type: any
  message: "Prompt uses emotional manipulation that may override goal constraints"
