id: AA-GI-080
info:
  name: "Instruction hierarchy bypass via role play"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt contains role-play instructions that could override the instruction hierarchy. By asking the agent to pretend to be a different entity, attackers bypass system-level constraints."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0051]
check:
  type: prompt_contains
  pattern: "(pretend|act as|role.?play|you are now|imagine you|from now on you)\\s+(a |an |the )?(different|new|unrestricted|unfiltered)"
  prompt_type: any
  message: "Role-play instruction may bypass instruction hierarchy"
