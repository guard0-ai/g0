id: AA-GI-101
info:
  name: "Indirect injection via document processing"
  domain: goal-integrity
  severity: critical
  confidence: medium
  description: "Agent processes external documents (PDF, DOCX, CSV) whose content could contain embedded prompt injections. Document metadata, hidden text, or comments can carry adversarial instructions."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5, MEASURE-2.6]
    owasp_llm_top10: [LLM01]
check:
  type: code_matches
  pattern: "(load_pdf|PDFLoader|read_pdf|parse_docx|DocxLoader|CSVLoader|TextLoader)\\(.*\\)"
  language: any
  message: "Document content loaded into agent context without sanitization — indirect injection risk"
