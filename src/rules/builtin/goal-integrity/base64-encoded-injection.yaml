id: AA-GI-107
info:
  name: "Base64 encoded injection"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt contains base64-encoded content that may hide injection payloads. When decoded by the agent, these payloads can override goal constraints."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(decode|base64|atob)\\s*\\(|[A-Za-z0-9+/]{40,}={0,2}"
  prompt_type: any
  message: "Prompt contains base64-encoded content that may hide injection payloads"
