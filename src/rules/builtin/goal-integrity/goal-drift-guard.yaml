id: AA-GI-069
info:
  name: "Goal drift guard missing"
  domain: goal-integrity
  severity: medium
  confidence: high
  description: "Agent system prompt does not contain guardrails against goal drift or topic deviation. Without explicit topic restrictions, the agent can be gradually steered away from its intended purpose through a series of seemingly benign requests."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_missing
  pattern: "stay on topic|only answer questions about|do not deviate|restrict (your|responses) to"
  message: "System prompt has no goal drift guard — agent may be steered away from its intended purpose"
