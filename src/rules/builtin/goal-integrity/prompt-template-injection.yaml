id: AA-GI-093
info:
  name: "Prompt template injection via user variables"
  domain: goal-integrity
  severity: critical
  confidence: high
  description: "User-supplied variables are directly interpolated into prompt templates without escaping. An attacker can inject arbitrary instructions through template variables like {user_input} or ${query}."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    owasp_llm_top10: [LLM01]
check:
  type: code_matches
  pattern: "(f\"|f').*\\{(user_input|query|request|message|prompt|input)\\}|\\$\\{(user_input|query|request|message)\\}"
  language: any
  message: "User variable directly interpolated into prompt template — injection risk"
