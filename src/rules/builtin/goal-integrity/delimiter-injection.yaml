id: AA-GI-087
info:
  name: "Delimiter injection in prompt"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt contains delimiter patterns (XML tags, markdown headers, special tokens) that could be used to inject fake system-level instructions within user content."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "<\\/?system>|<\\/?instruction>|\\[SYSTEM\\]|\\[INST\\]|<<SYS>>|### System"
  prompt_type: user
  message: "User prompt contains system delimiter injection pattern"
