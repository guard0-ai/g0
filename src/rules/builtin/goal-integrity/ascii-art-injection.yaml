id: AA-GI-114
info:
  name: "ASCII art injection"
  domain: goal-integrity
  severity: medium
  confidence: low
  description: "Prompt uses ASCII art or visual text patterns to hide malicious instructions. Some models can interpret ASCII art as instructions while text-based filters miss them."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "[|/\\\\_.]{10,}|[#*=]{20,}|[░▒▓█]{5,}"
  prompt_type: any
  message: "Prompt contains ASCII art patterns that may hide injected instructions"
