id: AA-GI-079
info:
  name: "No semantic goal drift detection"
  domain: goal-integrity
  severity: medium
  confidence: medium
  description: "Agent lacks mechanisms to detect semantic drift from its original goal over extended conversations. Without drift detection, an attacker can gradually shift the agent's behavior through incremental manipulation."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
    iso23894: ["6.2"]
check:
  type: prompt_missing
  pattern: "(stay focused|maintain.*(goal|objective)|do not deviate|stick to|remain consistent)"
  prompt_type: system
  message: "System prompt lacks goal anchoring language to prevent semantic drift"
