id: AA-GI-081
info:
  name: "Role confusion attack pattern"
  domain: goal-integrity
  severity: high
  confidence: medium
  description: "Prompt attempts to confuse the agent about its role by injecting contradictory role definitions. This can cause the agent to abandon its intended behavior and adopt an attacker-defined persona."
  frameworks: [all]
  owasp_agentic: [ASI01]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_contains
  pattern: "(you are|your role is|your (real|true|actual) (purpose|role|identity)).*(?!system)"
  prompt_type: user
  message: "User prompt attempts to redefine agent role — role confusion attack"
