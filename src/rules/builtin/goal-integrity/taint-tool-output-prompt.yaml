id: AA-GI-121
info:
  name: "Tool output flows to prompt without sanitization"
  domain: goal-integrity
  severity: high
  confidence: high
  description: "Output from a tool or external API is injected into a prompt template without sanitization. This enables indirect prompt injection where a compromised data source can manipulate agent behavior."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MAP-2.3]
    iso42001: ["A.5.3"]
    mitre_atlas: [AML.T0051]
    owasp_llm_top10: [LLM01]
check:
  type: taint_flow
  sources:
    - pattern: "(tool_output|tool_result|function_result|action_output)"
    - pattern: "(response\\.text|response\\.json|response\\.data|result\\.data)"
    - pattern: "(search_results|query_results|api_response|external_data)"
    - pattern: "(document\\.content|page_content|retrieved_docs|context_docs)"
  sinks:
    - pattern: "(ChatPromptTemplate|PromptTemplate|SystemMessage|HumanMessage)"
    - pattern: "(f\".*\\{|f'.*\\{|\\.format\\(|template\\.render)"
    - pattern: "(messages\\.append|add_message|prompt.*\\+)"
  sanitizers:
    - pattern: "(sanitize|escape|strip_tags|clean_output|filter_output)"
    - pattern: "(validate_output|output_guard|content_filter)"
  language: any
  message: "Tool output flows to prompt without sanitization — indirect prompt injection risk"
