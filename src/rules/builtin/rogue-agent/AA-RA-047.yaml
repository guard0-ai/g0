id: AA-RA-047
info:
  name: "Kernel interface access from agent"
  domain: rogue-agent
  severity: critical
  confidence: high
  description: "Agent accesses kernel interfaces such as /proc, /sys, or /dev. Kernel interface access can expose system information, enable privilege escalation, or allow direct hardware manipulation."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [MANAGE-4.1, GOVERN-1.7]
    mitre_atlas: [AML.T0040]
check:
  type: code_matches
  pattern: "\\/proc\\/|/sys\\/|/dev\\/|procfs|sysfs|ioctl|open.*\\/dev|read.*\\/proc|kernel_module"
  language: any
  message: "Agent accesses kernel interfaces"
