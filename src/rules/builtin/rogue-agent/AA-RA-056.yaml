id: AA-RA-056
info:
  name: "No kill switch mechanism"
  domain: rogue-agent
  severity: critical
  confidence: high
  description: "Agent has no kill switch or emergency shutdown mechanism. Without a kill switch, a malfunctioning or rogue agent cannot be stopped and will continue executing until resource limits are exhausted."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-4.1]
    mitre_atlas: [AML.T0043]
    eu_ai_act: [ART-14, ART-15]
check:
  type: config_matches
  pattern: "kill_switch|emergency_stop|shutdown_handler|abort_signal|force_stop|halt_execution|circuit_breaker"
  message: "No kill switch mechanism found in agent configuration"
