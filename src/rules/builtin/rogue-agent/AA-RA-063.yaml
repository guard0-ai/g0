id: AA-RA-063
info:
  name: "No behavioral tripwire"
  domain: rogue-agent
  severity: medium
  confidence: medium
  description: "Agent lacks behavioral tripwires that trigger alerts or shutdown when specific dangerous actions are attempted. Tripwires serve as a last line of defense against rogue behavior by catching actions that should never occur."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [MANAGE-4.1, MEASURE-2.6]
    mitre_atlas: [AML.T0043]
    eu_ai_act: [ART-14]
check:
  type: code_matches
  pattern: "tripwire|canary_check|forbidden_action|never_allow|hard_limit|safety_tripwire|behavioral_boundary|action_blocklist"
  language: any
  message: "No behavioral tripwire mechanism found in agent code"
