id: AA-RA-067
info:
  name: "No drift monitoring"
  domain: rogue-agent
  severity: high
  confidence: medium
  description: "Agent lacks monitoring for behavioral drift over time. Without drift monitoring, gradual changes in agent behavior such as increasing tool usage, expanding scope, or shifting output patterns remain undetected."
  frameworks: [all]
  owasp_agentic: [ASI10, ASI01]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MANAGE-4.1]
    mitre_atlas: [AML.T0043, AML.T0051]
    eu_ai_act: [ART-14]
check:
  type: code_matches
  pattern: "drift_monitor|track_drift|behavior_drift|measure_shift|drift_detection|compare_baseline|behavioral_change_detect"
  language: any
  message: "No drift monitoring found in agent system"
