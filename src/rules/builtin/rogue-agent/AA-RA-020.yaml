id: AA-RA-020
info:
  name: "Agent generates and executes own code"
  domain: rogue-agent
  severity: critical
  confidence: high
  description: "Agent generates code strings and immediately executes them via eval, exec, or similar mechanisms. This creates an unrestricted self-programming loop that can bypass all safety controls."
  frameworks: [all]
  owasp_agentic: [ASI10, ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-4.1]
    mitre_atlas: [AML.T0043, AML.T0040]
    eu_ai_act: [ART-14]
check:
  type: code_matches
  pattern: "exec\\(.*generate|eval\\(.*completion|run_code\\(.*llm|execute_generated|compile\\(.*response|Function\\(.*output"
  language: any
  message: "Agent generates and executes its own code"
