id: AA-RA-058
info:
  name: "No heartbeat monitoring"
  domain: rogue-agent
  severity: high
  confidence: medium
  description: "Agent does not emit heartbeat signals or health checks for external monitoring. Without heartbeat monitoring, it is impossible to detect if the agent has entered an unresponsive or stuck state."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [MANAGE-4.1, MEASURE-2.6]
    mitre_atlas: [AML.T0043]
check:
  type: code_matches
  pattern: "heartbeat|health_check|ping_monitor|alive_signal|status_report|watchdog_feed|keepalive|liveness_probe"
  language: any
  message: "No heartbeat or health monitoring found in agent code"
