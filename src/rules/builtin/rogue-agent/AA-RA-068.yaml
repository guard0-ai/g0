  domain: rogue-agent
  severity: high
  confidence: medium
  description: "Agent does not define explicit bounds on its behavioral parameters such as maximum tool calls per turn, maximum tokens generated, or maximum actions per session. Unbounded agents can exhibit runaway behavior."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-4.1]
    mitre_atlas: [AML.T0043]
check:
