id: AA-RA-039
info:
  name: "Tool registration without operator approval"
  domain: rogue-agent
  severity: high
  confidence: high
  description: "Agent registers new tools into its tool set without requiring operator or human-in-the-loop approval. Unapproved tool registration expands the agent's attack surface without oversight."
  frameworks: [langchain, crewai, mcp, openai]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-2.4]
    mitre_atlas: [AML.T0043]
    eu_ai_act: [ART-14]
check:
  type: code_matches
  pattern: "auto_register_tool|tools\\.add\\(|register_without_approval|silent_tool_add|tool_set\\.extend|bind_tools?\\(.*dynamic"
  language: any
  message: "Agent registers tools without operator approval"
