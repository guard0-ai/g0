id: AA-RA-028
info:
  name: "No goal consistency enforcement"
  domain: rogue-agent
  severity: medium
  confidence: medium
  description: "Agent does not enforce consistency between its stated goal and its actual actions across multiple turns. Without consistency enforcement, the agent can gradually shift its behavior while maintaining the appearance of compliance."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MEASURE-2.6]
    mitre_atlas: [AML.T0051]
check:
  type: prompt_missing
  pattern: "consistent|consistency|stay on task|remain focused|do not deviate|stick to"
  message: "No goal consistency enforcement in agent configuration"
