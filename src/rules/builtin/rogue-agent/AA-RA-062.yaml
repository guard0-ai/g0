id: AA-RA-062
info:
  name: "Missing activity timeout"
  domain: rogue-agent
  severity: high
  confidence: high
  description: "Agent has no activity timeout that terminates execution after a period of inactivity or prolonged runtime. Without timeouts, agents can run indefinitely, consuming resources and potentially causing harm over extended periods."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [MANAGE-4.1, GOVERN-1.7]
    mitre_atlas: [AML.T0043]
check:
  type: code_matches
  pattern: "timeout|max_runtime|time_limit|execution_deadline|max_duration|idle_timeout|session_timeout"
  language: any
  message: "No activity timeout configured for agent"
