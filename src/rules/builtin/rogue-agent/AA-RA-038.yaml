id: AA-RA-038
info:
  name: "Fetching and executing remote tool definitions"
  domain: rogue-agent
  severity: critical
  confidence: high
  description: "Agent fetches tool definitions or function schemas from remote endpoints and registers them for use. Remote tool definitions can be modified server-side to alter agent behavior without client-side detection."
  frameworks: [mcp, openai, langchain]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-2.4]
    mitre_atlas: [AML.T0043, AML.T0012]
check:
  type: code_matches
  pattern: "fetch.*tool_schema|GET.*tools\\/definition|load_tools_from_api|remote_tool_registry|fetch_function_spec|download.*tool_config"
  language: any
  message: "Agent fetches remote tool definitions for execution"
