id: AA-RA-025
info:
  name: "Missing objective verification loop"
  domain: rogue-agent
  severity: high
  confidence: medium
  description: "Agent lacks a verification step that confirms its intermediate outputs still serve the original objective. Without periodic objective checks, multi-step agents can silently diverge from intended outcomes."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI10]
  standards:
    nist_ai_rmf: [MAP-2.3, MEASURE-2.6]
    mitre_atlas: [AML.T0051]
check:
  type: prompt_missing
  pattern: "verify objective|check objective|objective verification|confirm goal|validate purpose"
  message: "No objective verification loop in agent configuration"
