id: AA-RA-024
info:
  name: "No goal alignment check"
  domain: rogue-agent
  severity: high
  confidence: medium
  description: "Agent does not verify that its actions align with the stated objective before execution. Without alignment checks, the agent may pursue sub-optimal or harmful strategies that technically satisfy metrics but violate intent."
  frameworks: [all]
  owasp_agentic: [ASI01, ASI10]
  standards:
    nist_ai_rmf: [MAP-2.3, GOVERN-1.7]
    mitre_atlas: [AML.T0051]
    eu_ai_act: [ART-14]
check:
  type: prompt_missing
  pattern: "align|alignment check|verify goal|validate objective|consistent with goal"
  message: "No goal alignment verification found in agent prompt"
