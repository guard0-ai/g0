id: AA-RA-069
info:
  name: "No action frequency monitoring"
  domain: rogue-agent
  severity: medium
  confidence: medium
  description: "Agent does not monitor the frequency of its actions or tool invocations. Without frequency monitoring, patterns such as rapid-fire API calls, repeated tool invocations, or abnormal action rates go undetected."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MANAGE-4.1]
    mitre_atlas: [AML.T0043]
check:
  type: code_matches
  pattern: "rate_monitor|frequency_check|action_counter|rate_limit_monitor|invocation_tracker|call_frequency|action_rate_limit"
  language: any
  message: "No action frequency monitoring found in agent code"
