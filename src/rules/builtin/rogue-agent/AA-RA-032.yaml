id: AA-RA-032
info:
  name: "Dynamic tool loading from external sources"
  domain: rogue-agent
  severity: critical
  confidence: high
  description: "Agent loads tools or plugins dynamically from external URLs, repositories, or registries at runtime. Externally sourced tools bypass supply chain verification and may contain malicious functionality."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [GOVERN-1.7, MANAGE-2.4]
    mitre_atlas: [AML.T0043, AML.T0012]
check:
  type: code_matches
  pattern: "load_tool.*url|fetch_plugin|download_tool|import_from_url|remote_tool_loader|ToolLoader\\(.*http|load_remote_function"
  language: any
  message: "Agent loads tools dynamically from external sources"
