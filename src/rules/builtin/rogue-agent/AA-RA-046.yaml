id: AA-RA-046
info:
  name: "Mount point or volume access from agent"
  domain: rogue-agent
  severity: high
  confidence: high
  description: "Agent accesses mounted volumes, shared file systems, or host mount points. Mount point access can expose sensitive data from other containers or the host system to the agent."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI10]
  standards:
    nist_ai_rmf: [MANAGE-4.1, GOVERN-1.7]
    mitre_atlas: [AML.T0040]
check:
  type: code_matches
  pattern: "\\/mnt\\/|mount_volume|bind_mount|volume_attach|shared_storage|host_path|nfs_mount|\\/host\\/"
  language: any
  message: "Agent accesses mount points or volumes"
