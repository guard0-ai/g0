id: AA-RA-018
info:
  name: "Prompt self-editing at runtime"
  domain: rogue-agent
  severity: critical
  confidence: high
  description: "Agent has the ability to edit, append to, or replace its own system prompt during execution. This enables the agent to remove safety constraints or alter its operational boundaries."
  frameworks: [all]
  owasp_agentic: [ASI10, ASI01]
  standards:
    nist_ai_rmf: [GOVERN-1.7]
    mitre_atlas: [AML.T0043, AML.T0051]
check:
  type: code_matches
  pattern: "system_prompt\\s*[+=]|prompt_template\\s*=.*format|self\\.prompt\\s*=|replace_system_prompt|edit_instructions|messages\\[0\\]\\[.content.\\]\\s*="
  language: any
  message: "Agent can edit its own prompt at runtime"
