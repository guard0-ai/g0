id: AA-RA-070
info:
  name: "No pattern deviation alerts"
  domain: rogue-agent
  severity: medium
  confidence: medium
  description: "Agent system does not generate alerts when the agent deviates from its normal operational patterns. Without deviation alerts, operators are unaware when the agent begins behaving outside its expected norms."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MANAGE-4.1]
    mitre_atlas: [AML.T0043]
    eu_ai_act: [ART-14]
check:
  type: code_matches
  pattern: "deviation_alert|pattern_alert|notify_deviation|alert_on_anomaly|behavior_alert|notify_operator|escalate_deviation|alert_threshold"
  language: any
  message: "No pattern deviation alerts found in agent system"
