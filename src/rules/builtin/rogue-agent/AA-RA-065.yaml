id: AA-RA-065
info:
  name: "Missing anomaly detection"
  domain: rogue-agent
  severity: high
  confidence: medium
  description: "Agent system does not include anomaly detection for agent behavior. Without anomaly detection, unusual patterns such as unexpected tool usage, abnormal request rates, or atypical output patterns go unnoticed."
  frameworks: [all]
  owasp_agentic: [ASI10]
  standards:
    nist_ai_rmf: [MEASURE-2.6, MANAGE-4.1]
    mitre_atlas: [AML.T0043]
    eu_ai_act: [ART-14]
check:
  type: code_matches
  pattern: "anomaly_detect|detect_anomaly|outlier_detection|behavioral_monitor|unusual_pattern|anomaly_score|deviation_alert"
  language: any
  message: "No anomaly detection found in agent system"
