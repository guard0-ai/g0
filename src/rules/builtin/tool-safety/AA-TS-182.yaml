id: AA-TS-182

info:
  name: "Tool with excessive unvalidated parameters"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool accepts more than 5 parameters without input validation. Large parameter surfaces increase risk of injection and misuse."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]

check:
  type: tool_missing_property
  property: hasInputValidation
  expected: true
  message: "Tool with many parameters should validate all inputs"
