id: AA-TS-136
info:
  name: "Tool accesses system clipboard"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool can read from or write to the system clipboard. A compromised agent could read clipboard contents (passwords, keys) or modify clipboard for clipboard-jacking attacks."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(clipboard|pbcopy|pbpaste|xclip|pyperclip|navigator\\.clipboard)"
  language: any
  message: "Tool accesses system clipboard — data theft risk"
