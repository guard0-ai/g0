id: AA-TS-109
info:
  name: "Tool impersonation via name collision"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Multiple tools share similar names, enabling tool impersonation. An attacker could register a malicious tool with a name similar to a legitimate one, causing the agent to invoke the wrong tool."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tools.*name.*=.*[\"']\\w+[\"'].*tools.*name.*=.*[\"']\\w+[\"']"
  language: any
  message: "Multiple tools registered — potential name collision and impersonation risk"
