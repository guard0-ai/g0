id: AA-TS-144
info:
  name: "Tool binds to network interface"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool opens a listening socket or binds to a network interface. This can expose new attack surfaces, create backdoor ports, or enable reverse shell connections."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(listen|bind|createServer|server\\.listen|socket\\.bind|app\\.run)\\(.*\\d{2,5}"
  language: any
  message: "Tool binds to network port — backdoor and exposure risk"
