id: AA-TS-072
info:
  name: "Dangerous tool flag explicitly enabled"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Code explicitly enables a dangerous tool flag such as allow_dangerous_tool or dangerous_tools=True. These flags exist as safety gates in frameworks like LangChain, and enabling them bypasses built-in protections against hazardous tool operations."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "allow_dangerous_tool|dangerous_tools\\s*=\\s*True|DANGEROUS"
  language: any
  message: "Dangerous tool flag explicitly enabled"
