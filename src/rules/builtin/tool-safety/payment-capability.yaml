id: AA-TS-106
info:
  name: "Tool with payment/financial capability"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool can execute financial transactions. A compromised agent could initiate unauthorized payments, transfers, or purchases."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    eu_ai_act: [Article 14]
check:
  type: code_matches
  pattern: "(stripe|paypal|payment|charge|transfer|purchase|checkout|billing)\\.(create|execute|process|initiate)"
  language: any
  message: "Tool has financial transaction capability — unauthorized payment risk"
