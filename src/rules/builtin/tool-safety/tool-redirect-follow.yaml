id: AA-TS-111
info:
  name: "Tool follows HTTP redirects"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool follows HTTP redirects without restriction. An attacker can use open redirects to bypass SSRF protections and reach internal services through redirect chains."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(follow_redirects|redirect|maxRedirects|followRedirect)\\s*[=:]\\s*(True|true|\\d{2,})"
  language: any
  message: "Tool follows redirects without restriction — redirect-based SSRF risk"
