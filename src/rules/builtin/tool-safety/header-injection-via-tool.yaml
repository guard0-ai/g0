id: AA-TS-110
info:
  name: "HTTP header injection via tool parameter"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool uses user-controlled values in HTTP headers. An attacker can inject CRLF sequences to add malicious headers, enabling response splitting or session hijacking."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "headers\\[.*\\]\\s*=\\s*(input|param|arg|user)|headers.*\\{.*:\\s*(input|param|arg)"
  language: any
  message: "HTTP header set with user input — header injection risk"
