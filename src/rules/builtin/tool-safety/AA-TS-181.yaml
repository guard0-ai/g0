id: AA-TS-181

info:
  name: "Tool with excessive dangerous capabilities"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool has 3 or more dangerous capabilities (shell, code-execution, filesystem-write, network, database). This level of capability inflation increases attack surface and violates least-privilege principle."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    iso42001: ["8.4"]

check:
  type: tool_has_capability
  capability: shell
  message: "Tool has excessive dangerous capabilities — consider splitting into focused, least-privilege tools"
