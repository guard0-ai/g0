id: AA-TS-164
info:
  name: "Tool with infrastructure-as-code access"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool can execute Terraform, Pulumi, or CloudFormation operations. A compromised agent could provision unauthorized infrastructure, modify security groups, or delete resources."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(terraform|pulumi|cloudformation|cdk)\\.(apply|destroy|deploy|plan|up)"
  language: any
  message: "Tool has infrastructure-as-code access — infrastructure tampering risk"
