id: AA-TS-122
info:
  name: "Tool API with wildcard CORS"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool exposes an API with wildcard CORS (*) allowing any origin to make requests. This enables cross-origin attacks where malicious websites can invoke tool operations."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(Access-Control-Allow-Origin|cors).*[\"']\\*[\"']|cors\\(\\{\\s*origin\\s*:\\s*true"
  language: any
  message: "Tool API exposes wildcard CORS — cross-origin attack risk"
