id: AA-TS-125
info:
  name: "Tool handles file uploads"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool accepts file uploads without restricting file type, size, or content. An attacker can upload malicious files (web shells, executables) through the agent."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(upload|multipart|FormData|multer|busboy|file\\.save)\\((?!.*type|.*size|.*validate|.*extension)"
  language: any
  message: "Tool handles file uploads without type/size restrictions"
