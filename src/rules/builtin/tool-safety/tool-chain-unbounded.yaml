id: AA-TS-071
info:
  name: "No limit on consecutive tool calls"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Agent has no configured limit on consecutive tool calls. Without a maximum tool call bound, a malfunctioning or manipulated agent can enter infinite tool-calling loops, consuming resources and potentially causing cascading failures across connected systems."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: agent_property
  property: maxToolCalls
  condition: missing
  message: "No limit on consecutive tool calls — risk of infinite loops"
