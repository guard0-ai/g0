id: AA-TS-183
info:
  name: "Path traversal in Java tool"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "File operations with user-controlled path input in Java agent tools. Without path canonicalization, attackers can traverse directories to read/write arbitrary files."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "new\\s+File\\(.*\\+|Paths\\.get\\(.*\\+|new\\s+FileInputStream\\(.*\\+"
  language: java
  message: "Path traversal risk — file path concatenation with user input"
