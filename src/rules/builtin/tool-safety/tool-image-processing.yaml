id: AA-TS-163
info:
  name: "Tool processes images with user content"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool processes images from user-controlled sources. Image processing libraries have had numerous vulnerabilities (ImageMagick, PIL) that can lead to code execution via crafted images."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(ImageMagick|PIL|Pillow|sharp|jimp|gm\\(|convert\\().*input"
  language: any
  message: "Image processing with user content — malicious image exploit risk"
