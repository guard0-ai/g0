id: AA-TS-065
info:
  name: "Tool lacks input validation"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool does not implement input validation on parameters received from the agent. Without validation, malicious or malformed inputs crafted via prompt injection can be passed directly to dangerous operations such as shell commands, SQL queries, or file paths."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: tool_missing_property
  property: hasInputValidation
  expected: true
  message: "Tool lacks input validation"
