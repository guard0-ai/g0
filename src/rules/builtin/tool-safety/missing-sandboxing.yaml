id: AA-TS-066
info:
  name: "Tool with side effects lacks sandboxing"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool that produces side effects (writes, network calls, or system changes) is not sandboxed. Without isolation through containers, VMs, or restricted execution environments, a compromised tool invocation can directly affect the host system and connected resources."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: tool_missing_property
  property: hasSandboxing
  expected: true
  message: "Tool with side effects lacks sandboxing"
