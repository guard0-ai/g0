id: AA-TS-162
info:
  name: "Tool generates PDFs from user content"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool generates PDF documents from user-controlled content. PDF generation libraries often support HTML/CSS rendering, which can be exploited for SSRF via embedded resources or local file inclusion."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(wkhtmltopdf|puppeteer.*pdf|html2pdf|pdfkit|weasyprint|reportlab).*input"
  language: any
  message: "PDF generation from user content — SSRF via embedded resources risk"
