id: AA-TS-146
info:
  name: "Tool returns secrets in response"
  domain: tool-safety
  severity: critical
  confidence: medium
  description: "Tool response may include secrets, tokens, or credentials that get added to the agent's context. These secrets could then be leaked through the agent's responses to users."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "return.*(password|secret|token|api_key|credential|private_key|connection_string)"
  language: any
  message: "Tool returns secrets in response — credential leakage via agent context"
