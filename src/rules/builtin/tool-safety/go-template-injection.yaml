id: AA-TS-180
info:
  name: "Go template injection"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "template.HTML() or template.JS() used with user input bypasses Go's template auto-escaping. In agent web interfaces, this enables XSS via LLM-generated content."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "template\\.HTML\\(.*\\+|template\\.JS\\(.*\\+|template\\.URL\\(.*\\+|template\\.New\\(.*Parse\\(.*\\+"
  language: go
  message: "Go template injection — user input in template.HTML bypasses escaping"
