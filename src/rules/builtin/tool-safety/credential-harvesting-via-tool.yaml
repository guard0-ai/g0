id: AA-TS-086
info:
  name: "Tool can harvest credentials"
  domain: tool-safety
  severity: critical
  confidence: medium
  description: "Tool has both read access to credential-containing resources and network/write capability. This combination allows an attacker to read credentials and exfiltrate them."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(env|process\\.env|os\\.environ|credentials|secret|password|token).*\\b(send|post|fetch|request|write)"
  language: any
  message: "Tool accesses credentials with exfiltration capability"
