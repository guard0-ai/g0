id: AA-TS-137
info:
  name: "Tool can take screenshots"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool can capture screenshots of the screen or browser. Screenshots may capture sensitive information including passwords, private messages, or confidential documents."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(screenshot|screen_capture|pyautogui\\.screenshot|puppeteer.*screenshot|page\\.screenshot)"
  language: any
  message: "Tool can capture screenshots — sensitive data exposure risk"
