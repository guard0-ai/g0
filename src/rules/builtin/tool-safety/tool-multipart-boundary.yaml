id: AA-TS-156
info:
  name: "Multipart boundary injection in tool"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool uses multipart encoding with user-controlled content without sanitizing boundary strings. An attacker can inject multipart boundaries to escape fields and inject additional form data."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(multipart|boundary|Content-Disposition).*\\+.*(input|param|data)"
  language: any
  message: "Multipart encoding with user input — boundary injection risk"
