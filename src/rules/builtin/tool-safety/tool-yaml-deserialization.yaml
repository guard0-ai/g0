id: AA-TS-152
info:
  name: "Unsafe YAML deserialization in tool"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool uses yaml.load() without SafeLoader, enabling arbitrary Python object construction. An attacker can craft YAML payloads that execute code during deserialization."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "yaml\\.load\\((?!.*SafeLoader|.*safe_load)|yaml\\.unsafe_load\\(|new\\s+Yaml\\(\\)\\.load\\(|SnakeYaml.*\\.load\\(|yaml\\.NewDecoder\\("
  language: any
  message: "Unsafe YAML deserialization — remote code execution risk"
