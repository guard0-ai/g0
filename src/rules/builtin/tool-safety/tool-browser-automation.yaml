id: AA-TS-138
info:
  name: "Tool performs browser automation"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool uses browser automation (Puppeteer, Selenium, Playwright). Automated browsers can access authenticated sessions, read cookies, and perform actions on behalf of the user."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(puppeteer|selenium|playwright|webdriver|chromium)\\.launch|Browser\\(|webdriver\\."
  language: any
  message: "Tool uses browser automation — session hijacking risk"
