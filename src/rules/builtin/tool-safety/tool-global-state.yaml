id: AA-TS-120
info:
  name: "Tool modifies global state"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool modifies global or shared state such as global variables, singletons, or environment. This can affect other tools and agents sharing the same process, enabling cross-tool attacks."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(global\\s+\\w+|globals\\(\\)|window\\.|globalThis\\.|os\\.environ\\[.*\\]\\s*=)"
  language: any
  message: "Tool modifies global state — cross-tool contamination risk"
