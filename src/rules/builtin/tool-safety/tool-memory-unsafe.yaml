id: AA-TS-114
info:
  name: "Tool uses memory-unsafe operations"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool uses memory-unsafe operations like ctypes, cffi, or native bindings. Memory corruption vulnerabilities in tool implementations can lead to arbitrary code execution."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "\\b(ctypes\\.|cffi\\.|ffi\\.cdef|ffi\\.new|Buffer\\.allocUnsafe|allocUnsafeSlow|c_void_p|POINTER\\(|byref\\(|addressof\\()"
  language: any
  message: "Tool uses memory-unsafe operations"
