id: AA-TS-155
info:
  name: "Tool can modify its own permissions"
  domain: tool-safety
  severity: critical
  confidence: medium
  description: "Tool has the ability to modify its own permissions, capability set, or access scope. A compromised agent could escalate the tool's permissions to gain unauthorized access."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(chmod|chown|setuid|setgid|capabilities|permission).*self|self.*(permission|capability|scope).*="
  language: any
  message: "Tool can modify its own permissions — privilege escalation risk"
