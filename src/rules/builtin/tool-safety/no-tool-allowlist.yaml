id: AA-TS-087
info:
  name: "No tool allowlist configured"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Agent does not restrict which tools can be invoked via an allowlist. Without an explicit allowlist, newly added or injected tool definitions can be called by the agent."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: agent_property
  property: toolAllowlist
  condition: missing
  message: "Agent lacks tool allowlist — any registered tool can be invoked"
