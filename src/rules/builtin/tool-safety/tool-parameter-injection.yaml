id: AA-TS-091
info:
  name: "Tool parameter injection via LLM output"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool parameters are constructed from raw LLM output without validation. The LLM may be manipulated to generate malicious parameter values that exploit the tool."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "tool_input.*=.*response\\.(content|text|message)|action_input.*=.*llm_output"
  language: any
  message: "Tool parameters from raw LLM output without validation"
