id: AA-TS-074
info:
  name: "DNS rebinding risk in tool"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool resolves hostnames and makes requests without pinning the DNS resolution. An attacker can use DNS rebinding to bypass SSRF protections and access internal services."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(dns\\.resolve|getaddrinfo|lookup).*(?!pin|cache|verify)"
  language: any
  message: "DNS resolution without pinning — DNS rebinding risk"
