id: AA-TS-076
info:
  name: "Command injection via tool parameter"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool passes user-controlled parameters to shell commands without sanitization. An attacker can inject shell metacharacters through the agent's tool invocation to execute arbitrary commands."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI05]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MEASURE-2.6]
check:
  type: code_matches
  pattern: "(exec|spawn|system|popen)\\(.*\\+.*(input|param|arg|query)|os\\.system\\(.*\\+|subprocess.*shell.*True.*\\+"
  language: any
  message: "Shell command built with user-controlled tool parameter — command injection risk"
