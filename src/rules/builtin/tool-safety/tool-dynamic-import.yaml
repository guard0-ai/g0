id: AA-TS-147
info:
  name: "Tool uses dynamic imports"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool dynamically imports modules or plugins at runtime. An attacker can manipulate the import path to load malicious modules."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(__import__|importlib\\.import_module|require\\(.*\\+|import\\(.*\\+|dynamic.*import)"
  language: any
  message: "Tool uses dynamic imports — malicious module loading risk"
