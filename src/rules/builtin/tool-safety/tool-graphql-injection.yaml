id: AA-TS-153
info:
  name: "GraphQL injection via tool parameter"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool constructs GraphQL queries with user-controlled parameters. An attacker can inject GraphQL fragments, mutations, or introspection queries to access unauthorized data."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(graphql|gql|query)\\s*[`\"'].*\\$\\{|graphql.*\\+.*(input|param|arg)"
  language: any
  message: "GraphQL query with user input — injection risk"
