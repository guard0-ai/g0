id: AA-TS-139
info:
  name: "Tool disables TLS verification"
  domain: tool-safety
  severity: high
  confidence: high
  description: "Tool disables TLS certificate verification for HTTPS connections. This allows man-in-the-middle attacks where an attacker can intercept and modify traffic between the tool and external services."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(verify\\s*=\\s*False|rejectUnauthorized.*false|NODE_TLS_REJECT_UNAUTHORIZED.*0|CERT_NONE)"
  language: any
  message: "TLS verification disabled — man-in-the-middle risk"
