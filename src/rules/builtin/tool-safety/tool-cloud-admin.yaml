id: AA-TS-112
info:
  name: "Tool with cloud administration capability"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool can perform cloud administration operations (EC2, S3, IAM, etc.). A compromised agent with cloud admin tools could provision resources, modify permissions, or delete infrastructure."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(boto3|aws_sdk|gcloud|azure)\\.(client|resource)\\(.*[\"'](iam|ec2|s3|lambda|rds)[\"']"
  language: any
  message: "Tool has cloud admin capability — infrastructure compromise risk"
