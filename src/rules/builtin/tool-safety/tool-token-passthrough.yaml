id: AA-TS-132
info:
  name: "Tool passes auth tokens to external services"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool passes authentication tokens or API keys to external services based on agent parameters. An attacker can direct the tool to send credentials to malicious endpoints."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(Authorization|Bearer|api.key|token).*=.*(param|input|arg)|headers.*auth.*=.*input"
  language: any
  message: "Tool passes auth tokens based on agent parameters — credential theft risk"
