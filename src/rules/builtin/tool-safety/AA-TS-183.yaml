id: AA-TS-183

info:
  name: "Overprivileged tool description"
  domain: tool-safety
  severity: medium
  confidence: medium
  description: "Tool description uses overprivileged language like 'any file', 'all access', 'full control', or 'unrestricted'. This may lead to LLM granting excessive permissions."
  frameworks: [all]
  owasp_agentic: [ASI02, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    iso42001: ["8.4"]

check:
  type: code_matches
  pattern: "(?:any\\s+file|all\\s+(?:files?|access|permissions?)|unrestricted|full\\s+(?:access|control)|no\\s+(?:limits?|restrictions?))"
  message: "Tool description uses overprivileged language — restrict to specific, bounded capabilities"
