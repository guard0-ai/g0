id: AA-TS-126
info:
  name: "Tool with Kubernetes API access"
  domain: tool-safety
  severity: critical
  confidence: high
  description: "Tool can interact with the Kubernetes API. A compromised agent could manipulate cluster resources, deploy malicious containers, or escalate privileges within the cluster."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(kubernetes|k8s_client|kubectl|KubeConfig|client\\.CoreV1Api|client\\.AppsV1Api)"
  language: any
  message: "Tool has Kubernetes API access — cluster compromise risk"
