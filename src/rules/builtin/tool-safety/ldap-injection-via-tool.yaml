id: AA-TS-101
info:
  name: "LDAP injection via tool parameter"
  domain: tool-safety
  severity: high
  confidence: medium
  description: "Tool constructs LDAP queries with user-controlled parameters. An attacker can inject LDAP filter expressions to bypass authentication or extract directory information."
  frameworks: [all]
  owasp_agentic: [ASI02]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(ldap|LDAP).*search.*\\+.*(input|param|user|query)|filter.*=.*\\(.*(uid|cn|sn).*\\+.*input"
  language: any
  message: "LDAP query with user input — LDAP injection risk"
