id: AA-SC-102
info:
  name: "Vendored dependency may be outdated"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "Project vendors (bundles) dependencies directly in the repository. Vendored dependencies often become outdated and miss security patches."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(vendor|vendored|third_party|lib/external)/.*\\.(py|js|ts|go|rs)"
  language: any
  message: "Vendored dependency detected — may miss security updates"
