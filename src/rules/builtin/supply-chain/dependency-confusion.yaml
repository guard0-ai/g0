id: AA-SC-074
info:
  name: "Dependency confusion risk"
  domain: supply-chain
  severity: critical
  confidence: medium
  description: "Project uses both private and public registries without scoping. An attacker can publish a malicious package on the public registry with the same name as a private package, which takes precedence."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "registry\\s*=.*\\n.*registry\\s*=|--extra-index-url|--index-url.*\\n.*--extra-index-url"
  language: any
  message: "Multiple registries configured — dependency confusion risk"
