id: AA-SC-085
info:
  name: "GitHub Action with unpinned version"
  domain: supply-chain
  severity: high
  confidence: high
  description: "GitHub Action references a branch (main, master) or mutable tag instead of a pinned SHA. An attacker who compromises the Action can inject malicious code into the CI pipeline."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "uses:\\s+[\\w-]+/[\\w-]+@(main|master|latest|v\\d+)\\s*$"
  language: any
  message: "GitHub Action with unpinned version — supply chain injection risk"
