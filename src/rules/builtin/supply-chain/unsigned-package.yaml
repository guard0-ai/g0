id: AA-SC-078
info:
  name: "Package installed without signature verification"
  domain: supply-chain
  severity: medium
  confidence: medium
  description: "Package is installed without cryptographic signature verification. Unsigned packages cannot guarantee they haven't been tampered with during distribution."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(pip install|npm install|yarn add).*--no-verify|--ignore-signature|--skip-integrity"
  language: any
  message: "Package installed without signature verification"
