id: AA-SC-100
info:
  name: "Container runs as root"
  domain: supply-chain
  severity: high
  confidence: high
  description: "Docker container runs as root user. If an attacker compromises the agent running in the container, they gain root access to the container and potentially the host."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "USER root|run.*--user.*root|privileged.*true"
  language: any
  message: "Container runs as root — container escape with root access risk"
