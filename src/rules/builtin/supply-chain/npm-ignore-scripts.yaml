id: AA-SC-096
info:
  name: "npm install without --ignore-scripts not enforced"
  domain: supply-chain
  severity: medium
  confidence: medium
  description: "npm install runs lifecycle scripts by default. Malicious packages can execute arbitrary code through install scripts. Consider using --ignore-scripts for untrusted packages."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "npm install(?!.*--ignore-scripts).*\\b(unknown|untrusted|third.party)"
  language: any
  message: "npm install runs scripts — consider --ignore-scripts for untrusted packages"
