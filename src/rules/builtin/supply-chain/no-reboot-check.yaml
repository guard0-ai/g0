id: AA-SC-137
info:
  name: "Deployment without kernel update check"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "Deployment or CI/CD configuration does not include a check for pending kernel security updates or required reboots. Running on unpatched kernels exposes the host to known privilege escalation vulnerabilities."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(needs-restarting|reboot-required|needrestart|kexec)"
  language: any
  message: "Add kernel update and reboot checks to deployment pipeline"
