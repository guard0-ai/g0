id: AA-SC-109
info:
  name: "PyPI package name resembles internal package"
  domain: supply-chain
  severity: high
  confidence: low
  description: "Package name follows internal naming conventions (prefixed with company name, internal project names). An attacker who registers this name on PyPI can hijack installations."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(import|from)\\s+(internal|private|corp|company|myorg)[-_]\\w+"
  language: python
  message: "Package name suggests internal package — dependency confusion risk"
