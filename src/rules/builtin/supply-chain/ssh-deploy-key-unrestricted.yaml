id: AA-SC-134
info:
  name: "SSH deploy key unrestricted"
  domain: supply-chain
  severity: medium
  confidence: medium
  description: "SSH private key or deploy key referenced in CI/CD configuration. If the key is stored in repository secrets without command restrictions in authorized_keys, any repo admin can extract it and gain full SSH access to the server."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(DEPLOY_KEY|SSH_PRIVATE_KEY|SSH_KEY|id_rsa|id_ed25519)"
  language: any
  message: "SSH deploy key in CI config — may grant unrestricted server access"
