id: AA-SC-116
info:
  name: "Dockerfile ADD from remote URL"
  domain: supply-chain
  severity: high
  confidence: high
  description: "Dockerfile uses ADD with a remote URL to download files. ADD does not verify integrity of downloaded files and auto-extracts archives, which can be exploited."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "ADD\\s+https?://"
  language: any
  message: "Dockerfile ADD from URL — no integrity verification"
