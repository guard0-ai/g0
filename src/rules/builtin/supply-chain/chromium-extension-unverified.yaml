id: AA-SC-112
info:
  name: "Browser extension loaded without store verification"
  domain: supply-chain
  severity: high
  confidence: medium
  description: "Browser extension is loaded from a local file or non-store URL. Sideloaded extensions bypass the Chrome Web Store security review process."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(load-extension|extensionPath|sideload|crx|unpacked).*extension"
  language: any
  message: "Browser extension loaded outside official store"
