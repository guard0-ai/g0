id: AA-SC-104
info:
  name: "Environment file copied into container image"
  domain: supply-chain
  severity: critical
  confidence: high
  description: "Dockerfile copies .env or secrets files into the container image. These files persist in image layers and can be extracted by anyone with access to the image."
  frameworks: [all]
  owasp_agentic: [ASI04, ASI03]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(COPY|ADD)\\s+.*(\\.env|secrets|credentials|\\*\\.key|\\*\\.pem)"
  language: any
  message: "Secrets copied into container image — exposed in image layers"
