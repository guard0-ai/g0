id: AA-SC-099
info:
  name: "Unpinned Python dependency in requirements"
  domain: supply-chain
  severity: medium
  confidence: high
  description: "Python requirements file contains unpinned dependencies (no == version). Unpinned dependencies allow any version to be installed, including compromised ones."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "^(langchain|openai|anthropic|transformers|torch|numpy|pandas)\\s*$|^\\w+>=\\d+"
  language: any
  message: "Python dependency without exact version pin"
