id: AA-SC-101
info:
  name: "Model downloaded via torrent or P2P"
  domain: supply-chain
  severity: high
  confidence: high
  description: "Model is downloaded via torrent or peer-to-peer networks. P2P downloads cannot guarantee integrity and may deliver tampered model files."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "(torrent|magnet:|p2p|bittorrent|aria2c).*model"
  language: any
  message: "Model downloaded via P2P — integrity not guaranteed"
