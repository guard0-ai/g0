id: AA-SC-110
info:
  name: "AI IDE extension from unverified publisher"
  domain: supply-chain
  severity: medium
  confidence: low
  description: "Project configuration references AI IDE extensions from unverified publishers. Malicious extensions can access all project files, credentials, and code."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: code_matches
  pattern: "extensions.*[\"']((?!ms-python|github|microsoft)\\w+\\.\\w+-ai|\\w+\\.copilot-\\w+)[\"']"
  language: any
  message: "AI extension from unverified publisher"
