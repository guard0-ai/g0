id: AA-SC-136
info:
  name: "Backup configuration without encryption"
  domain: supply-chain
  severity: high
  confidence: medium
  description: "Agent workspace backup configuration does not include encryption. Unencrypted backups of agent data containing credentials, session history, and memory files can be accessed if the backup destination is compromised."
  frameworks: [all]
  owasp_agentic: [ASI04, ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
check:
  type: config_matches
  pattern: "backup.*encrypt.*false|restic.*--no-lock|borg.*--encryption\\s+none"
  message: "Backup configuration lacks encryption — sensitive agent data exposed in backups"
