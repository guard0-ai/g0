id: AA-SC-107
info:
  name: "No Software Bill of Materials (SBOM)"
  domain: supply-chain
  severity: low
  confidence: medium
  description: "Project does not include or generate a Software Bill of Materials. Without an SBOM, it is difficult to track and audit all dependencies for known vulnerabilities."
  frameworks: [all]
  owasp_agentic: [ASI04]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    eu_ai_act: [Article 14]
check:
  type: config_matches
  pattern: "sbom|cyclonedx|spdx|bill.of.materials"
  message: "No SBOM configuration found"
