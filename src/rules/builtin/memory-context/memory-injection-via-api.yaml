id: AA-MP-124
info:
  name: "Memory injection via external API"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Agent memory is populated from external API responses without content validation. A compromised API can inject adversarial content into the agent's memory."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(response|api_result|fetch_result).*memory\\.(save|add|store)|memory.*(api|external|response)"
  language: any
  message: "External API response stored in memory without validation"
