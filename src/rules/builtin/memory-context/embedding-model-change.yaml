id: AA-MP-107
info:
  name: "Embedding model change without re-indexing"
  domain: memory-context
  severity: medium
  confidence: medium
  description: "Code references an embedding model without ensuring the vector index was built with the same model. Mismatched embeddings cause retrieval failures and can be exploited."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(embedding_model|embed_model)\\s*=.*\\n.*(load_index|from_persist|from_existing)"
  language: any
  message: "Embedding model may not match stored index — retrieval integrity risk"
