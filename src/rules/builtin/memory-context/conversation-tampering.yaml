id: AA-MP-076
info:
  name: "Conversation history tampering"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Conversation history can be directly modified through API calls or database access. An attacker can alter past messages to inject instructions or remove safety warnings."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(messages|history|chat_log)\\[\\d+\\]\\s*=|messages\\.splice|messages\\.pop|del messages\\["
  language: any
  message: "Conversation history directly modified — tampering risk"
