id: AA-MP-119
info:
  name: "Vector database uses shared collection"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Multiple agents or users share the same vector database collection. Cross-contamination between users allows one user's data to influence another user's retrievals."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "collection_name\\s*=\\s*[\"'](default|main|shared|global|documents)[\"']"
  language: any
  message: "Shared vector collection — cross-user contamination risk"
