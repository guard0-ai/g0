id: AA-MP-063
info:
  name: "Raw user input stored in memory"
  domain: memory-context
  severity: high
  confidence: medium
  description: "User input is stored directly into agent memory or chat history without sanitization. An attacker can inject malicious content that persists across turns, enabling delayed prompt injection or context poisoning attacks."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "memory\\.(add|save|store)\\(.*user_?input|chat_?history\\.append\\(.*user"
  language: any
  message: "Raw user input stored in memory without sanitization"
