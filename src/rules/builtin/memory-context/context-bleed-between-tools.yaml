id: AA-MP-132
info:
  name: "Context bleed between tool calls"
  domain: memory-context
  severity: medium
  confidence: medium
  description: "Context from one tool call leaks into subsequent tool calls. Information from a sensitive tool (e.g., database) could influence the behavior of another tool."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "agent_scratchpad|intermediate_steps.*append|tool_results.*=.*\\[\\].*\\n.*append"
  language: any
  message: "Tool execution context may bleed between calls"
