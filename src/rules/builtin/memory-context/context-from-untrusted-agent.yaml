id: AA-MP-126
info:
  name: "Context from untrusted agent"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Agent receives context or memory from another agent without verification. A compromised upstream agent can inject malicious context into the downstream agent's memory."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(agent_output|agent_response|delegate_result).*memory|context.*=.*other_agent"
  language: any
  message: "Context from another agent without verification"
