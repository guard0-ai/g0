id: AA-MP-123
info:
  name: "Context injection via filename"
  domain: memory-context
  severity: medium
  confidence: medium
  description: "Document filenames are included in RAG context without sanitization. Attackers can craft filenames containing prompt injection payloads that get fed to the LLM."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(source|filename|file_path|document_name).*=.*metadata|context.*filename"
  language: any
  message: "Filename included in context without sanitization"
