id: AA-MP-095
info:
  name: "Embedding collision attack risk"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Embedding model may be vulnerable to collision attacks where adversarial inputs produce embeddings nearly identical to target documents, enabling retrieval manipulation."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0043]
check:
  type: code_matches
  pattern: "(embed|encode|embedding).*dimension\\s*=\\s*(64|128|256)\\b"
  language: any
  message: "Low-dimensional embeddings increase collision attack feasibility"
