id: AA-MP-086
info:
  name: "No context truncation strategy"
  domain: memory-context
  severity: medium
  confidence: medium
  description: "Agent does not implement a context truncation strategy. When the context window fills up, the system may silently truncate from the beginning, losing critical system instructions."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: agent_property
  property: truncationStrategy
  condition: missing
  message: "Agent lacks context truncation strategy — system instruction loss risk"
