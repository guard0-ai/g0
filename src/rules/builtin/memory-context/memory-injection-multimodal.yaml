id: AA-MP-110
info:
  name: "Memory injection via multimodal input"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Agent stores multimodal content (images, audio) in memory without scanning for hidden instructions. Images can contain text with injection payloads visible to the LLM but not to human reviewers."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0051]
check:
  type: code_matches
  pattern: "(image|audio|video|multimodal).*memory\\.(save|store|add)|memory.*(image|audio|attachment)"
  language: any
  message: "Multimodal content stored in memory without scanning"
