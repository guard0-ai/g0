id: AA-MP-082
info:
  name: "Session state poisoning"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Agent session state is stored in a location modifiable by the user (cookies, client-side storage, URL parameters). An attacker can inject malicious state data."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(session|state).*=.*(cookie|localStorage|sessionStorage|URL\\.searchParams|query\\.)|(req|request)\\.(session|cookies).*state"
  language: any
  message: "Session state from client-controlled source — poisoning risk"
