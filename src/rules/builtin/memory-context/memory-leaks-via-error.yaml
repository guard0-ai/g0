id: AA-MP-128
info:
  name: "Memory content leaked in error messages"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Error handlers include memory content or conversation history in error messages. This can expose sensitive user data or internal context to unauthorized parties."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(raise|throw|Error|Exception)\\(.*(memory|history|context|conversation|messages)"
  language: any
  message: "Memory content in error messages — information disclosure risk"
