id: AA-MP-089
info:
  name: "Vector index without backup"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Vector database index is not backed up. If the index is corrupted or deleted (through attack or failure), all indexed knowledge is lost."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(Chroma|FAISS|Qdrant|Pinecone)\\((?!.*backup|.*snapshot|.*persist)"
  language: any
  message: "Vector index without backup — data loss risk"
