id: AA-MP-074
info:
  name: "Memory injection via conversation history"
  domain: memory-context
  severity: high
  confidence: medium
  description: "User messages are stored in agent memory without sanitization. An attacker can inject malicious content into conversation history that influences future interactions."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(memory|history|chat_memory)\\.(save|add|append|store)\\(.*user_input|message_history\\.append"
  language: any
  message: "User input stored in memory without sanitization — memory injection risk"
