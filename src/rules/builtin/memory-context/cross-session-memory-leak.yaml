id: AA-MP-090
info:
  name: "Cross-session memory leak"
  domain: memory-context
  severity: high
  confidence: medium
  description: "Agent memory from one session leaks into another session. An attacker in one session can plant information that influences a different user's session."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(global_memory|shared_memory|class_memory|cls\\.memory|static.*memory)\\s*="
  language: any
  message: "Global/shared memory variable — cross-session leak risk"
