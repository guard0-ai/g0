id: AA-MP-072
info:
  name: "No max context token limit configured"
  domain: memory-context
  severity: medium
  confidence: high
  description: "Agent has no maxContextTokens property configured. Without an explicit token ceiling, the agent may accept inputs that exceed the model's context window, causing silent truncation of system instructions or out-of-memory failures."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: agent_property
  property: maxContextTokens
  condition: missing
  message: "No max context token limit configured for agent"
