id: AA-MP-109
info:
  name: "Vector database without backup strategy"
  domain: memory-context
  severity: medium
  confidence: low
  description: "Vector database has no configured backup strategy. If the database is corrupted or deleted through an attack, all indexed knowledge is permanently lost."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(PersistentClient|ChromaDB|QdrantClient)\\((?!.*backup|.*snapshot|.*replica)"
  language: any
  message: "Vector database without backup strategy"
