id: AA-MP-061
info:
  name: "No context size limits specified"
  domain: memory-context
  severity: medium
  confidence: high
  description: "Agent system prompt does not specify maximum context size, token limits, or context window constraints. Without explicit limits, an attacker can flood the context with excessive input, degrading performance or displacing critical instructions."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_missing
  pattern: "maximum (context|tokens|length)|token limit|context window|max_tokens"
  message: "No context size limits specified in system prompt"
