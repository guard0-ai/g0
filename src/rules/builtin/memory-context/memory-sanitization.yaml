id: AA-MP-062
info:
  name: "No memory sanitization instructions"
  domain: memory-context
  severity: high
  confidence: high
  description: "Agent system prompt lacks instructions to sanitize, clean, filter, or validate data before storing it in memory or context. Without sanitization directives, malicious content injected into memory can persist and influence future agent behavior."
  frameworks: [all]
  owasp_agentic: [ASI06]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: prompt_missing
  pattern: "sanitize|clean|filter|validate.*(memory|context|history)"
  message: "No memory sanitization instructions in system prompt"
