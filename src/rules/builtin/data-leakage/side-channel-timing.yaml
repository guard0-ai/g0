id: AA-DL-077
info:
  name: "Timing side-channel leakage"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Agent response time varies based on sensitive data lookups. An attacker can infer whether records exist or match conditions by measuring response timing."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(if|when).*\\b(exists|found|match)\\b.*return(?!.*constant_time|.*sleep|.*delay)"
  language: any
  message: "Response time may leak data existence — timing side-channel"
