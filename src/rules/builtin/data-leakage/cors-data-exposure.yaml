id: AA-DL-104
info:
  name: "CORS allows cross-origin data access"
  domain: data-leakage
  severity: high
  confidence: high
  description: "CORS policy allows cross-origin requests with credentials. A malicious website can make authenticated requests to the agent API and read the response."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "Access-Control-Allow-Origin.*\\*.*Access-Control-Allow-Credentials.*true|credentials.*true.*origin.*\\*"
  language: any
  message: "CORS with credentials and wildcard origin — cross-origin data access"
