id: AA-DL-131
info:
  name: "Secrets logged via Java logger"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Secrets (API keys, tokens, passwords) logged via Java logging frameworks (SLF4J, Log4j, java.util.logging). Log files become credential theft targets."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "logger?\\.(info|warn|error|debug)\\(.*(apiKey|api_key|[Tt]oken|[Ss]ecret|[Pp]assword|[Cc]redential)|System\\.out\\.print(ln)?\\(.*(apiKey|api_key|[Tt]oken|[Ss]ecret|[Pp]assword)"
  language: java
  message: "Secret logged via Java logger — credential exposure"
