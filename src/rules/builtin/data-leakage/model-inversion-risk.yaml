id: AA-DL-111
info:
  name: "Model inversion attack risk"
  domain: data-leakage
  severity: medium
  confidence: low
  description: "Agent exposes model prediction probabilities or logits. These outputs can be used in model inversion attacks to reconstruct training data or infer membership."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
    mitre_atlas: [AML.T0024]
check:
  type: code_matches
  pattern: "(logprobs|top_logprobs|probabilities|logits|confidence_score).*\\b(return|response|output)"
  language: any
  message: "Model probabilities exposed — model inversion attack risk"
