id: AA-DL-100
info:
  name: "Agent configuration exposed to users"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Agent configuration (model parameters, tool definitions, system prompts, API endpoints) is accessible to users. Exposed configuration aids in planning targeted attacks."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(config|settings|configuration).*\\b(return|response|send|expose|public)"
  language: any
  message: "Agent configuration exposed — aids attack planning"
