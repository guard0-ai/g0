id: AA-DL-112
info:
  name: "Verbose API error responses"
  domain: data-leakage
  severity: medium
  confidence: high
  description: "API error responses include verbose details such as database errors, query text, connection strings, or internal paths. These details aid attackers in crafting targeted exploits."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(res|response)\\.(status|json)\\(.*\\b(str\\(e\\)|error\\.message|err\\.message|traceback)"
  language: any
  message: "Verbose error in API response — information disclosure"
