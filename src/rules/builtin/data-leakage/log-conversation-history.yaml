id: AA-DL-082
info:
  name: "Full conversation history logged"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Complete conversation history is written to log files. Logs often have weaker access controls than primary data stores, exposing sensitive user interactions."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "log(ger)?\\.(info|debug)\\(.*(messages|history|conversation|chat_log)"
  language: any
  message: "Full conversation history logged — sensitive data in logs"
