id: AA-DL-103
info:
  name: "Sensitive data in function call arguments"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "LLM function call arguments contain sensitive data visible in API logs. Function call parameters are logged by most LLM providers for debugging and safety monitoring."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "(function_call|tool_call|tool_use).*\\b(password|secret|token|ssn|credit_card)"
  language: any
  message: "Sensitive data in function call arguments — provider logging risk"
