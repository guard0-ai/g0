id: AA-DL-121
info:
  name: "API key or secret flows to log statement"
  domain: data-leakage
  severity: high
  confidence: high
  description: "An API key, secret, or credential variable flows to a logging or print statement. This can expose secrets in log files, monitoring systems, or terminal output."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [GOVERN-1.2]
    iso42001: ["A.5.3"]
    owasp_llm_top10: [LLM06]
check:
  type: taint_flow
  sources:
    - pattern: "(api_key|api_secret|secret_key|access_token|auth_token|password)"
    - pattern: "(OPENAI_API_KEY|ANTHROPIC_API_KEY|AWS_SECRET|GOOGLE_API_KEY)"
    - pattern: "(os\\.environ\\[|os\\.getenv\\(|process\\.env\\.)"
    - pattern: "(credentials|private_key|client_secret|bearer_token)"
  sinks:
    - pattern: "(console\\.log|console\\.error|console\\.warn|console\\.info)"
    - pattern: "(print\\(|logging\\.info|logging\\.debug|logging\\.warning|logger\\.)"
    - pattern: "(log\\.info|log\\.debug|log\\.error|log\\.warn)"
  sanitizers:
    - pattern: "(mask|redact|censor|\\*{3,}|obscure|truncate_secret)"
    - pattern: "(hide_key|mask_token|sanitize_secret)"
  language: any
  message: "API key or secret flows to log/print statement — secret exposure risk"
