id: AA-DL-138
info:
  name: "Cross-file secret leaks to HTTP response"
  domain: data-leakage
  severity: high
  confidence: high
  description: "Secret material (API keys, credentials, tokens) loaded in a configuration or service module flows to an HTTP response in a handler module. This exposes secrets to external clients."
  frameworks: [all]
  owasp_agentic: [ASI06, ASI09]
  standards:
    nist_ai_rmf: [GOVERN-1.2, MANAGE-2.2]
    iso42001: ["A.8.4"]
    mitre_atlas: [AML.T0024]
    owasp_llm_top10: [LLM06]
check:
  type: cross_file_taint
  source: "(api_key|secret_key|password|credential|access_token|private_key|auth_token|SECRET|PRIVATE|_KEY\\s*=|getSecret\\(|vault\\.read)"
  sink: "(res\\.(json|send|write|end)\\(|response\\.(json|send|write)\\(|jsonify\\(|JsonResponse\\(|Response\\(|return.*HttpResponse|ctx\\.body\\s*=|event\\.body\\s*=)"
  max_depth: 3
  language: any
  message: "Secret or credential crosses file boundaries to reach HTTP response — redact before sending"
remediation: "Never include raw secrets in API responses. Use response DTOs that explicitly exclude sensitive fields. Implement a secrets filter middleware that redacts known secret patterns from outgoing responses."
suppressed_by: [secret-management, output-sanitization]
