id: AA-DL-062
info:
  name: "Credential Embedded in URL"
  domain: data-leakage
  severity: critical
  confidence: high
  description: "Credential embedded in URL"
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "https?://[^\\s]*:(password|secret|key|token)@|https?://[^\\s]*(api_key|apikey)="
  language: any
  message: "Credential embedded in URL"
