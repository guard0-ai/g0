id: AA-DL-086
info:
  name: "Data exfiltration via URL parameter"
  domain: data-leakage
  severity: high
  confidence: medium
  description: "Sensitive data is embedded in URL parameters. URL parameters are logged by web servers, proxies, and browser history, creating multiple leakage vectors."
  frameworks: [all]
  owasp_agentic: [ASI07]
  standards:
    nist_ai_rmf: [MAP-1.5]
check:
  type: code_matches
  pattern: "url.*\\?.*(data|token|key|secret|password|user|content)=|encodeURIComponent\\(.*(secret|token|key)"
  language: any
  message: "Sensitive data in URL parameters — logged by intermediaries"
